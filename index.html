// Genera un beep usando Web Audio API
function playBeep(type="warning"){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const patterns={
      warning:[{f:880,t:0,d:.12},{f:660,t:.15,d:.12},{f:880,t:.3,d:.25}],
      checkout:[{f:523,t:0,d:.15},{f:659,t:.18,d:.15},{f:784,t:.36,d:.15},{f:1047,t:.54,d:.3}],
      urgent:[{f:1000,t:0,d:.08},{f:800,t:.1,d:.08},{f:1000,t:.2,d:.08},{f:800,t:.3,d:.08},{f:1000,t:.4,d:.15}],
    };
    (patterns[type]||patterns.warning).forEach(({f,t,d})=>{
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=f;osc.type="sine";
      gain.gain.setValueAtTime(0,ctx.currentTime+t);
      gain.gain.linearRampToValueAtTime(.4,ctx.currentTime+t+.02);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+t+d);
      osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+d+.05);
    });
  }catch(e){console.warn("Audio no disponible",e);}
}

// Envía notificación del sistema (si el usuario la permite)
function pushNotif(title,body,type="warning"){
  if("Notification" in window&&Notification.permission==="granted"){

  }
  playBeep(type);
}

/* ─── API ─── */
const gasConfigured=()=>GAS_URL&&GAS_URL!=="PEGA_AQUI_TU_URL";
async function gasGet(params){
  if(!gasConfigured())throw new Error("URL no configurada");
  const qs=new URLSearchParams(params).toString();
  const r=await fetch(`${GAS_URL}?${qs}`,{redirect:"follow"});return r.json();
}
async function gasPost(body){
  if(!gasConfigured())throw new Error("URL no configurada");
  const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body),redirect:"follow"});return r.json();
}

/* ══════════════════════════════════════════
   CALENDARIO
══════════════════════════════════════════ */
function Calendario({reservas,svc,selectedDate,onSelect,selectedSvc}){
  const[mes,setMes]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const todayD=new Date();todayD.setHours(0,0,0,0);
  const ocupPorDia=useMemo(()=>{
    const map={};
    const porFecha={};
    reservas.forEach(r=>{
      if(r.estado==="completado")return;
      if(selectedSvc&&r.servicio!==selectedSvc)return;
      if(!r.date)return;
      if(!porFecha[r.date])porFecha[r.date]=[];
      porFecha[r.date].push(r);
    });
    Object.entries(porFecha).forEach(([fecha,rs])=>{
      let maxOcu=0;
      SLOTS.forEach(h=>{
        const ini=hMin(h),fin=ini+30;
        const ocu=rs.filter(r=>{const ri=hMin(r.hora||"0:0"),rf=ri+parseInt(r.dur||0);return ini<rf&&fin>ri;}).reduce((a,r)=>a+parseInt(r.adultos||0)+parseInt(r.ninos||0),0);
        if(ocu>maxOcu)maxOcu=ocu;
      });
      map[fecha]=maxOcu;
    });
    return map;
  },[reservas,selectedSvc]);
  const primerDia=new Date(mes.y,mes.m,1);
  const ultimoDia=new Date(mes.y,mes.m+1,0);
  const startDow=primerDia.getDay();
  const filas=Math.ceil((startDow+ultimoDia.getDate())/7);
  const getDayState=day=>{
    const d=new Date(mes.y,mes.m,day);d.setHours(0,0,0,0);
    if(d<todayD)return"past";
    const k=dateKey(d);const sv=selectedSvc?svc[selectedSvc]:null;const picoPers=ocupPorDia[k]||0;
    if(!picoPers)return"free";
    if(sv){const cap=sv.capacidad;const pct=picoPers/cap;if(pct>=1)return"full";if(pct>0.6)return"busy";if(pct>0)return"partial";}
    return"partial";
  };
  const stateColor={past:C.dim,free:C.green,partial:C.yellow,busy:C.orange,full:C.red};
  const stateBg={past:"transparent",free:"#10B98108",partial:"#F59E0B10",busy:"#F9731610",full:"#EF444413"};
  return(
    <div style={{background:C.card,borderRadius:13,padding:16,border:`1px solid ${C.border}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={()=>setMes(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1})} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.subtle,borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>‹</button>
        <div style={{fontWeight:700,fontSize:13}}>{MESES_ES[mes.m]} {mes.y}</div>
        <button onClick={()=>setMes(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1})} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.subtle,borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:5}}>
        {DIAS_ES.map(d=><div key={d} style={{textAlign:"center",fontSize:8,fontWeight:700,color:C.muted,padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {Array.from({length:filas*7}).map((_,i)=>{
          const day=i-startDow+1;
          if(day<1||day>ultimoDia.getDate())return<div key={i}/>;
          const d=new Date(mes.y,mes.m,day);const k=dateKey(d);const state=getDayState(day);
          const isPast=state==="past";const isSel=selectedDate===k;const isToday=k===dateKey(todayD);const sc=stateColor[state];
          return(
            <button key={i} onClick={()=>!isPast&&onSelect(k)} style={{
              position:"relative",aspectRatio:"1",borderRadius:7,border:"1px solid",fontSize:11,fontWeight:isSel||isToday?700:400,
              borderColor:isSel?C.accent:isToday?C.teal+"66":isPast?C.border+"44":sc+"44",
              background:isSel?C.accent+"30":stateBg[state],
              color:isPast?C.dim:isSel?C.accent:C.text,
              cursor:isPast?"default":"pointer",outline:"none",padding:1,
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,transition:"all .1s",
            }}>
              <span>{day}</span>
              {!isPast&&state!=="free"&&<div style={{width:3,height:3,borderRadius:"50%",background:sc,opacity:.9}}/>}
              {isToday&&<div style={{position:"absolute",top:1,right:2,width:3,height:3,borderRadius:"50%",background:C.teal}}/>}
            </button>
          );
        })}
      </div>
      <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
        {[["🟢","Libre"],["🟡","Parcial"],["🟠","Ocupado"],["🔴","Lleno"]].map(([ico,lbl])=>(
          <div key={lbl} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:C.muted}}><span style={{fontSize:8}}>{ico}</span>{lbl}</div>
        ))}
      </div>
    </div>
  );
}

function SelectorHoras({reservas,svc,selectedDate,selectedSvc,adultos,ninos,value,onChange,excludeId}){
  if(!selectedDate||!selectedSvc)return(
    <div style={{color:C.muted,fontSize:12,textAlign:"center",padding:"14px 0"}}>Selecciona servicio y fecha primero</div>
  );
  const sv=svc[selectedSvc];if(!sv)return null;
  const total=parseInt(adultos||0)+parseInt(ninos||0);
  const todayKey2=dateKey(new Date());const isToday=selectedDate===todayKey2;
  const now=new Date();const nowMin=now.getHours()*60+now.getMinutes()+15;
  const persEnRango=(ini,fin)=>reservas.filter(r=>{
    if(r.servicio!==selectedSvc||r.date!==selectedDate||r.estado==="completado")return false;
    if(excludeId&&String(r.id)===String(excludeId))return false;
    const ri=hMin(r.hora),rf=ri+parseInt(r.dur||0);return ini<rf&&fin>ri;
  }).reduce((a,r)=>a+parseInt(r.adultos||0)+parseInt(r.ninos||0),0);
  const proximoSlot=isToday?SLOTS.find(h=>hMin(h)>=nowMin):null;
  const DUR_TURNO=60;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
        <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:.5}}>HORA DE INICIO · 1h por turno</div>
        <div style={{fontSize:9,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:5,padding:"2px 7px"}}>🧹 15 min limpieza</div>
      </div>
      {isToday&&proximoSlot&&(
        <div style={{background:"#0EA5E912",border:"1px solid #0EA5E940",borderRadius:6,padding:"5px 10px",fontSize:10,color:C.accent,marginBottom:8}}>
          🕐 Hoy puedes reservar desde <b>{proximoSlot}</b>
        </div>
      )}
      {total<1&&<div style={{color:C.muted,fontSize:11,marginBottom:6}}>⚠️ Agrega al menos 1 persona</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:5}}>
        {SLOTS.map(h=>{
          const ini=hMin(h),fin=ini+DUR_TURNO;
          const isPast=isToday&&ini<nowMin;
          const ocu=persEnRango(ini,fin);const libres=sv.capacidad-ocu;
          const ok2=!isPast&&(total>0?libres>=total:libres>0);
          const isSel=value===h;const motivo=isPast?"pasado":!ok2?"lleno":null;
          return(
            <button key={h} onClick={()=>ok2&&onChange(h)} disabled={!ok2} style={{
              padding:"7px 4px",borderRadius:6,border:"1px solid",fontSize:10,fontWeight:isSel?700:400,
              cursor:ok2?"pointer":"not-allowed",
              borderColor:isSel?C.accent:isPast?C.border+"33":ok2?C.green+"44":C.red+"30",
              background:isSel?C.accent+"25":isPast?"transparent":ok2?"#10B98108":"#EF444408",
              color:isSel?C.accent:isPast?C.dim:ok2?C.green:C.red+"77",
              display:"flex",flexDirection:"column",alignItems:"center",gap:1,transition:"all .1s",opacity:isPast?0.35:1,
            }}>
              <span style={{fontWeight:700}}>{h}</span>
              <span style={{fontSize:8,color:isSel?C.accent+"aa":C.muted}}>hasta {minH(fin)}</span>
              <span style={{fontSize:7,color:isSel?C.accent:isPast?C.dim:ok2?C.muted:C.red+"77"}}>
                {isSel?"✓ sel":motivo?motivo:`+${libres}✓`}
              </span>
            </button>
          );
        })}
      </div>
      <div style={{marginTop:8,fontSize:9,color:C.muted}}>⏱️ Horario: 1:00 PM – 9:00 PM · Turnos 60min + 15min limpieza</div>
    </div>
  );
}

/* ══════════════════════════════════════════
   MODAL RESERVA ZONA HÚMEDA

function ModalReserva({reservas,onSave,onClose,editData,svc,saving,huespedes,reservasHab}){
  const todayKey=dateKey(new Date());
  const init=editData??{nombre:"",cedula:"",tipo:"huesped",hab:"",servicio:"jacuzzi",date:todayKey,hora:"",dur:60,adultos:1,ninos:0,pago:"efectivo",estado:"confirmado"};
  const[f,setF]=useState({...init,dur:60,adultos:parseInt(init.adultos||1),ninos:parseInt(init.ninos||0)});
  const[err,setErr]=useState("");const[step,setStep]=useState(editData?2:1);
  const[cedulaSearch,setCedulaSearch]=useState(init.cedula||"");
  const[huespadFound,setHuespadFound]=useState(null);
  const[acompZ,setAcompZ]=useState(()=>{try{return editData?.acompanantes?JSON.parse(editData.acompanantes):[];}catch{return[];}});
  const addAcompZ=()=>setAcompZ(p=>[...p,{nombre:"",tipo_doc:"CC",documento:""}]);
  const updAcompZ=(i,k,v)=>setAcompZ(p=>p.map((a,idx)=>idx===i?{...a,[k]:k==="nombre"?v.toUpperCase():v}:a));
  const delAcompZ=(i)=>setAcompZ(p=>p.filter((_,idx)=>idx!==i));

  const sv=svc[f.servicio]||Object.values(svc)[0];if(!sv)return null;
  const totalPers=(f.adultos||0)+(f.ninos||0);

  const totalBrutoZ=f.tipo==="huesped"?0:Math.round(sv.precio_adulto*(f.adultos||0)+sv.precio_nino*(f.ninos||0));
  const total=totalBrutoZ;

  // Buscar huésped por cédula
  const buscarPorCedula=(ced)=>{
    setCedulaSearch(ced);
    if(!ced||ced.length<5){setHuespadFound(null);return;}
    const h=huespedes.find(x=>String(x.cedula||"")===String(ced));
    if(h){
      // Verificar si tiene reserva activa de habitación
      const hoy=dateKey(new Date());
      const rh=reservasHab.find(r=>r.huesped_id===h.id&&r.checkin<=hoy&&r.checkout>hoy&&(r.estado==="ocupada"||r.estado==="reservada"));
      setHuespadFound({...h,reservaHab:rh});
      setF(p=>({...p,
        cedula:ced,
        nombre:`${h.nombre} ${h.apellidos}`,
        tipo:rh?"huesped":"externo",
        hab:rh?rh.hab:"",
        pago:rh?"cortesia":p.pago,
      }));
    }else{
      setHuespadFound(null);
      setF(p=>({...p,cedula:ced,nombre:"",tipo:"externo",hab:""}));
    }
  };

  const save=()=>{
    if(!f.nombre.trim())return setErr("Ingresa el nombre");
    if(f.tipo==="huesped"&&!f.hab.trim())return setErr("Ingresa número de habitación");
    if(!f.date)return setErr("Selecciona fecha");
    if(!f.hora)return setErr("Selecciona hora");
    if(totalPers<1)return setErr("Mínimo 1 persona");
    const ini=hMin(f.hora),fin=ini+60;
    const ocu=reservas.filter(r=>{
      if(r.servicio!==f.servicio||r.date!==f.date||r.estado==="completado")return false;
      if(editData&&String(r.id)===String(editData.id))return false;
      const ri=hMin(r.hora),rf=ri+parseInt(r.dur||0);return ini<rf&&fin>ri;
    }).reduce((a,r)=>a+parseInt(r.adultos||0)+parseInt(r.ninos||0),0);
    const libres=sv.capacidad-ocu;
    if(libres<totalPers)return setErr(`⛔ Sin cupos: ${libres} lugar${libres!==1?"es":""} disponibles`);
    setErr("");
    const pagoFinal=f.tipo==="huesped"?"cortesia":f.pago;
    onSave({...f,dur:60,adultos:parseInt(f.adultos||0),ninos:parseInt(f.ninos||0),total,pago:pagoFinal,acompanantes:JSON.stringify(acompZ)});
  };

    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:10,overflowY:"auto"}}>
      <div style={{background:C.card,borderRadius:15,width:"100%",maxWidth:650,border:`1px solid ${C.border}`,overflow:"hidden",maxHeight:"97vh",overflowY:"auto",animation:"fadeUp .2s ease"}}>
        <div style={{background:C.surface,padding:"13px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>

            <div style={{fontWeight:700,fontSize:14}}>{editData?"✏️ Editar Reserva":"➕ Nueva Reserva · Zona Húmeda"}</div>
            <div style={{color:C.muted,fontSize:10,marginTop:1}}>Hotel Cala</div>

                {huespadFound&&(
                  <div style={{marginTop:9,background:huespadFound.reservaHab?`${C.teal}15`:`${C.pink}15`,border:`1px solid ${huespadFound.reservaHab?C.teal:C.pink}44`,borderRadius:8,padding:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:18}}>{huespadFound.reservaHab?"🏨":"👤"}</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:12,color:huespadFound.reservaHab?C.teal:C.pink}}>{huespadFound.nombre} {huespadFound.apellidos}</div>
                        <div style={{color:C.muted,fontSize:10}}>📞 {huespadFound.telefono} · ✉️ {huespadFound.correo}</div>
                        {huespadFound.reservaHab?(
                          <div style={{color:C.teal,fontSize:10,marginTop:2,fontWeight:700}}>✅ Huésped activo · Hab. {huespadFound.reservaHab.hab} · Hasta {fmtFecha(huespadFound.reservaHab.checkout)} · GRATIS</div>
                        ):(

                {cedulaSearch.length>=5&&!huespadFound&&(

              {/* Servicios */}
              <div>
                <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:.5,marginBottom:7}}>SERVICIO</div>

                  {Object.entries(svc).map(([k,sv])=>(
                    <button key={k} onClick={()=>setF(p=>({...p,servicio:k,dur:60,hora:""}))} style={{

                      borderColor:f.servicio===k?sv.color:C.border,background:f.servicio===k?sv.bg:"transparent",color:f.servicio===k?sv.color:C.muted,transition:"all .12s"}}>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[["adultos","👨 ADULTOS",C.subtle,sv.precio_adulto],["ninos","👦 NIÑOS",C.pink,sv.precio_nino]].map(([campo,lbl,col,precio])=>(

                        <span style={{fontSize:16,fontWeight:700,minWidth:20,textAlign:"center"}}>{f[campo]||0}</span>

                {acompZ.map((a,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"110px 90px 1fr 28px",gap:6,marginBottom:6,alignItems:"end"}}>
                    <div>
                      {i===0&&<label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:2}}>TIPO DOC.</label>}
                      <select value={a.tipo_doc} onChange={e=>updAcompZ(i,"tipo_doc",e.target.value)}
                        style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 7px",color:C.text,fontSize:11,outline:"none",width:"100%"}}>
                        <option value="CC">🪪 Cédula</option>
                        <option value="TI">📋 T.Identidad</option>
                        <option value="CE">🌐 C.Extranjería</option>
                      </select>
                    </div>
                    <div>
                      {i===0&&<label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:2}}>No. DOC.</label>}
                      <input value={a.documento||""} onChange={e=>updAcompZ(i,"documento",e.target.value)}
                        placeholder="123456"
                        style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 7px",color:C.text,fontSize:11,outline:"none",width:"100%"}}/>
                    </div>
                    <div>
                      {i===0&&<label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:2}}>NOMBRE COMPLETO</label>}
                      <input value={a.nombre} onChange={e=>updAcompZ(i,"nombre",e.target.value)}
                        placeholder="NOMBRE"
                        style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 7px",color:C.text,fontSize:11,outline:"none",width:"100%",textTransform:"uppercase"}}/>
                    </div>
                    <button type="button" onClick={()=>delAcompZ(i)}
                      style={{background:C.red+"18",border:`1px solid ${C.red}33`,borderRadius:6,width:28,height:28,color:C.red,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",marginTop:i===0?14:0}}>×</button>
                  </div>
                ))}
                {acompZ.length===0&&<div style={{color:C.dim,fontSize:11,textAlign:"center",padding:"4px 0"}}>Sin acompañantes</div>}
              </div>

              {err&&<div style={{background:"#EF444415",border:"1px solid #EF444440",borderRadius:7,padding:"8px 13px",color:C.red,fontSize:11}}>⚠️ {err}</div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:10,color:C.muted,fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
                <button onClick={save} disabled={saving} style={{background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:7,padding:10,color:"white",fontSize:12,fontWeight:700,cursor:saving?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,opacity:saving?.7:1}}>
                  {saving&&<Spinner size={14} color="white"/>}{editData?"✓ Guardar":"✓ Confirmar Reserva"}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   MODAL ELIMINAR
══════════════════════════════════════════ */
function ModalDel({reserva,onOk,onClose,svc,saving,esHab=false}){
  const sv=esHab?{icono:"🏨",nombre:"Habitación"}:(svc[reserva.servicio]||{icono:"",nombre:reserva.servicio});
  return(
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.card,borderRadius:14,width:"100%",maxWidth:350,border:`1px solid ${C.red}44`,padding:22,animation:"fadeUp .2s ease"}}>
        <div style={{fontSize:30,textAlign:"center",marginBottom:9}}>🗑️</div>
        <div style={{fontWeight:700,fontSize:14,textAlign:"center",marginBottom:4}}>¿Eliminar este registro?</div>
        <div style={{color:C.muted,fontSize:11,textAlign:"center",marginBottom:15}}>Esta acción no se puede deshacer</div>
        <div style={{background:C.surface,borderRadius:7,padding:11,marginBottom:15,border:`1px solid ${C.border}`}}>
          <div style={{fontWeight:600,fontSize:12}}>{reserva.nombre||`${reserva.nombre}`}</div>
          <div style={{color:C.muted,fontSize:10,marginTop:2}}>{sv.icono} {sv.nombre} {esHab?`· Hab ${reserva.hab}`:`· ${reserva.date} ${reserva.hora}`}</div>
          <div style={{color:C.red,fontWeight:700,marginTop:4,fontSize:13}}>{fmt(reserva.total||0)}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:9,color:C.muted,fontWeight:700,cursor:"pointer",fontSize:11}}>Cancelar</button>
          <button onClick={onOk} disabled={saving} style={{background:"#EF444420",border:`1px solid ${C.red}44`,borderRadius:7,padding:9,color:C.red,fontWeight:700,cursor:saving?"not-allowed":"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
            {saving&&<Spinner size={12} color={C.red}/>}Sí, eliminar
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════

function ModalHuesped({onSave,onClose,editData,saving}){

            <Inp label="APELLIDOS" value={f.apellidos} onChange={v=>setF(p=>({...p,apellidos:v}))} placeholder="RUIZ MENDOZA" upper/>
          </div>

          {/* ── Contacto ── */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="TELÉFONO" value={f.telefono} onChange={v=>setF(p=>({...p,telefono:v}))} placeholder="3101234567"/>
            <Inp label="CORREO ELECTRÓNICO" value={f.correo} onChange={v=>setF(p=>({...p,correo:v}))} placeholder="correo@email.com"/>
          </div>

          {/* ── Dirección y residencia ── */}
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10}}>

            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              <Inp label="DIRECCIÓN (calle, carrera, avenida...)" value={f.direccion||""} onChange={v=>setF(p=>({...p,direccion:v}))} placeholder="Cra 15 # 23-45, Apto 301"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <Inp label="PAÍS" value={f.pais||"Colombia"} onChange={v=>setF(p=>({...p,pais:v}))} placeholder="Colombia"/>
                <Inp label="DEPARTAMENTO" value={f.departamento||""} onChange={v=>setF(p=>({...p,departamento:v}))} placeholder="Antioquia"/>
                <Inp label="CIUDAD" value={f.ciudad||""} onChange={v=>setF(p=>({...p,ciudad:v}))} placeholder="Medellín"/>

            </div>

          {/* ── Persona Jurídica toggle ── */}
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10}}>

              style={{display:"flex",alignItems:"center",gap:9,background:f.es_juridica?C.accent2+"18":"transparent",border:`1px solid ${f.es_juridica?C.accent2:C.border}`,borderRadius:8,padding:"8px 14px",cursor:"pointer",width:"100%",textAlign:"left",transition:"all .15s"}}>
              <div style={{width:20,height:20,borderRadius:5,background:f.es_juridica?C.accent2:"transparent",border:`2px solid ${f.es_juridica?C.accent2:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                {f.es_juridica&&<span style={{color:"white",fontSize:12,fontWeight:900}}>✓</span>}
              </div>
              <div>

                </div>
                <Inp label="REPRESENTANTE LEGAL" value={f.rep_legal||""} onChange={v=>setF(p=>({...p,rep_legal:v}))} placeholder="Juan Pérez García"/>
                <Inp label="ACTIVIDAD ECONÓMICA" value={f.actividad_economica||""} onChange={v=>setF(p=>({...p,actividad_economica:v}))} placeholder="Servicios turísticos, hospedaje..."/>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>

            <button onClick={save} disabled={saving} style={{background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:7,padding:10,color:"white",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
              {saving&&<Spinner size={14} color="white"/>}✓ Guardar
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   MODAL RESERVA HABITACIÓN
══════════════════════════════════════════ */
function ModalReservaHab({onSave,onClose,editData,saving,huespedes,habitaciones,reservasHab,temporadas}){
  const todayKey=dateKey(new Date());
  const manana=dateKey(new Date(Date.now()+86400000));
  const init=editData??{huesped_id:"",hab:"",checkin:todayKey,checkout:manana,adultos:1,ninos:0,mascotas:0,estado:"reservada",notas:"",pago:"pendiente",anticipo:0};
  // Al editar, asegurar que pago no quede vacío
  const initFinal={...init,pago:init.pago||"pendiente",anticipo:parseInt(init.anticipo)||0};
  const[f,setF]=useState({...initFinal});
  const[err,setErr]=useState("");
  const[cedulaBusq,setCedulaBusq]=useState(()=>{if(editData){const h=huespedes.find(x=>x.id===editData.huesped_id);return h?.cedula||"";}return "";});
  const[sugerencias,setSugerencias]=useState([]);
  const[descPct,setDescPct]=useState(editData?.descuento_pct||0);
  const[acomp,setAcomp]=useState(()=>{
    try{return editData?.acompanantes?JSON.parse(editData.acompanantes):[];}catch{return [];}
  });
  const addAcomp=()=>setAcomp(p=>[...p,{nombre:"",tipo_doc:"CC",documento:"",fecha_nac:""}]);
  const updAcomp=(i,k,v)=>setAcomp(p=>p.map((a,idx)=>idx===i?{...a,[k]:k==="nombre"?v.toUpperCase():v}:a));
  const delAcomp=(i)=>setAcomp(p=>p.filter((_,idx)=>idx!==i));
  const hab=habitaciones.find(h=>h.num===f.hab);
  const huesped=huespedes.find(h=>h.id===f.huesped_id);

  const buscarCedula=(v)=>{
    setCedulaBusq(v);
    if(v.length<2){setSugerencias([]);return;}
    const res=huespedes.filter(h=>String(h.cedula||"").includes(v)||`${h.nombre} ${h.apellidos}`.toLowerCase().includes(v.toLowerCase()));
    setSugerencias(res.slice(0,5));
    // Si coincidencia exacta de cédula, seleccionar directamente
    const exacto=huespedes.find(h=>String(h.cedula||"")===v);
    if(exacto){setF(p=>({...p,huesped_id:exacto.id}));setSugerencias([]);}
  };

  const seleccionarHuesped=(h)=>{setCedulaBusq(h.cedula);setF(p=>({...p,huesped_id:h.id}));setSugerencias([]);};

  const diffNoches=(a,b)=>{if(!a||!b)return 1;const[ay,am,ad]=a.split("-").map(Number);const[by,bm,bd]=b.split("-").map(Number);const da=new Date(ay,am-1,ad),db=new Date(by,bm-1,bd);return Math.max(1,Math.round((db-da)/(1000*60*60*24)));};
  const noches=diffNoches(f.checkin,f.checkout);
  // Detectar temporada alta en el rango de fechas
  const tempActiva=(temporadas||[]).find(t=>t.desde&&t.hasta&&f.checkin&&f.checkout&&f.checkin<=t.hasta&&f.checkout>=t.desde);
  const pctTemp=tempActiva?parseInt(tempActiva.porcentaje)||0:0;
  const precioBase=hab?hab.precio:0;
  const precio=Math.round(precioBase*(1+pctTemp/100));
  const capMax=hab?hab.capacidad:99;
  // Total personas que pagan = adultos + niños + mascotas (todos al mismo precio por persona)
  const totalPagantes=(parseInt(f.adultos)||1)+(parseInt(f.ninos)||0)+(parseInt(f.mascotas)||0);
  const totalBruto=precio*totalPagantes*noches;
  const descValor=Math.round(totalBruto*(descPct/100));
  const total=totalBruto-descValor;
  const capacidadSuperada=totalPagantes>capMax;
  // Badge temporada visible en el modal

  // Helpers para sumar/restar respetando capacidad máxima
  const cambiarCantidad=(campo,delta)=>{
    setF(p=>{
      const actual=parseInt(p[campo]||0);
      const nuevo=Math.max(campo==="adultos"?1:0, actual+delta);
      const otrosCampos=["adultos","ninos","mascotas"].filter(c=>c!==campo);
      const otros=otrosCampos.reduce((s,c)=>s+(parseInt(p[c]||0)),0);
      const total=nuevo+otros;
      if(total>capMax)return p;// bloquear si supera capacidad
      return{...p,[campo]:nuevo};
    });
  };

  const save=()=>{
    if(!f.huesped_id)return setErr("Busca y selecciona un huésped por cédula");
    if(!f.hab)return setErr("Selecciona una habitación");
    if(!f.checkin||!f.checkout)return setErr("Ingresa fechas de check-in y check-out");
    if(f.checkin>=f.checkout)return setErr("El check-out debe ser después del check-in");
    if(totalPagantes<1)return setErr("Debe haber al menos 1 persona");
    if(totalPagantes>capMax)return setErr(`⛔ Capacidad máxima de esta habitación: ${capMax} personas`);
    if(parseInt(f.anticipo)>total)return setErr("⛔ El anticipo no puede superar el total de "+fmt(total));
      // Verificar conflicto — busca por hab exacto Y por hab corrupto (⚠️) comparando fechas+precio
      const normD=s=>{if(!s)return"";const st=String(s).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(st))return st;if(st.includes("T")){try{return dateKey(new Date(st));}catch{}}return st;};
      const fHab=String(f.hab||"").trim();
      const fCI=normD(f.checkin),fCO=normD(f.checkout);
      const conflicto=reservasHab.find(r=>{
        if(String(r.id)===String(f.id||""))return false;
        if(r.estado!=="ocupada"&&r.estado!=="reservada")return false;
        const rCI=normD(r.checkin),rCO=normD(r.checkout);
        if(!rCI||!rCO)return false;
        const solapan=rCI<fCO&&rCO>fCI;
        if(!solapan)return false;
        const rHab=String(r.hab||"").trim();
        // Coincidencia exacta de hab
        if(rHab===fHab)return true;
        // Si el hab está corrupto (⚠️), comparar por huesped_id distinto + mismas fechas + mismo precio
        // Para evitar falsos positivos, solo bloquear si hay reserva con fechas que solapan
        // y el hab original de Sheets coincide (precio_noche igual al de esta hab)
        const hab=habitaciones.find(h=>h.num===fHab);
        if(rHab.includes("⚠️")&&hab&&parseInt(r.precio_noche)===hab.precio)return true;
        return false;
      });
      if(conflicto){
        const hC=huespedes.find(x=>x.id===conflicto.huesped_id);
        return setErr(`⛔ Hab. ${f.hab} ya tiene una reserva de ${hC?.nombre||"otro huésped"} del ${fmtFecha(fCI)} al ${fmtFecha(fCO)} — verifica en Sheets`);
      }
    setErr("");
    const anticipo=parseInt(f.anticipo)||0;
    const saldo=Math.max(0,total-anticipo);
    onSave({...f,adultos:parseInt(f.adultos)||1,ninos:parseInt(f.ninos)||0,mascotas:parseInt(f.mascotas)||0,precio_noche:precio,precio_base:precioBase,temporada:tempActiva?.nombre||'',temporada_pct:pctTemp,descuento_pct:descPct,descuento_valor:descValor,total_pagantes:totalPagantes,total,noches,anticipo,saldo,acompanantes:JSON.stringify(acomp)});
  };

  return(
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:10,overflowY:"auto"}}>
      <div style={{background:C.card,borderRadius:15,width:"100%",maxWidth:600,border:`1px solid ${C.border}`,animation:"fadeUp .2s ease",maxHeight:"97vh",overflowY:"auto"}}>
        <div style={{background:C.surface,padding:"13px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
          <div style={{fontWeight:700,fontSize:14}}>{editData?"✏️ Editar Reserva":"➕ Nueva Reserva de Habitación"}</div>
          <button onClick={onClose} style={{background:C.border,border:"none",color:C.subtle,borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:15}}>×</button>
        </div>
        <div style={{padding:18,display:"flex",flexDirection:"column",gap:13}}>
          {/* Buscador por cédula */}
          <div style={{position:"relative"}}>
            <div style={{color:C.accent,fontSize:10,fontWeight:700,letterSpacing:.5,marginBottom:7}}>🔍 BUSCAR HUÉSPED POR CÉDULA O NOMBRE</div>
            <input
              type="text" value={cedulaBusq}
              onChange={e=>buscarCedula(e.target.value)}
              placeholder="Escribe la cédula o nombre del huésped..."
              style={{background:C.surface,border:`1px solid ${f.huesped_id?C.green:C.border}`,borderRadius:7,padding:"10px 12px",color:C.text,fontSize:12,outline:"none",width:"100%",transition:"border .2s"}}
            />
            {sugerencias.length>0&&(
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:50,overflow:"hidden",boxShadow:"0 8px 28px #00000080",marginTop:3}}>
                {sugerencias.map(h=>(
                  <button key={h.id} onClick={()=>seleccionarHuesped(h)} style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.border}22`,padding:"10px 14px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,transition:"background .1s"}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:C.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>👤</div>
                    <div>
                      <div style={{fontWeight:700,fontSize:12,color:C.text}}>{h.nombre} {h.apellidos}</div>
                      <div style={{fontSize:10,color:C.muted}}>🪪 {h.cedula} &nbsp;·&nbsp; 📞 {h.telefono}</div>
                    </div>
                  </button>
                ))}
              </div>
            )}
            {huesped&&(
              <div style={{marginTop:8,background:`${C.green}15`,border:`1px solid ${C.green}44`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>✅</span>
                <div>
                  <div style={{fontWeight:700,fontSize:12,color:C.green}}>{huesped.nombre} {huesped.apellidos}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>🪪 {huesped.cedula} &nbsp;·&nbsp; 📞 {huesped.telefono} &nbsp;·&nbsp; ✉️ {huesped.correo}</div>
                </div>
                <button onClick={()=>{setCedulaBusq("");setF(p=>({...p,huesped_id:""}));}} style={{marginLeft:"auto",background:C.red+"22",border:"none",color:C.red,borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:10,flexShrink:0}}>✕ Cambiar</button>
              </div>
            )}
            {cedulaBusq.length>=2&&sugerencias.length===0&&!huesped&&(
              <div style={{marginTop:7,background:`${C.yellow}15`,border:`1px solid ${C.yellow}44`,borderRadius:7,padding:"8px 12px",fontSize:10,color:C.yellow}}>
                ⚠️ No se encontró ningún huésped. Regístralo primero en el módulo Huéspedes.
              </div>
            )}
          </div>

          {/* Fechas — VAN PRIMERO para que el selector de hab se actualice */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="CHECK-IN" value={f.checkin} onChange={v=>setF(p=>({...p,checkin:v,hab:""}))} type="date"/>
            <Inp label="CHECK-OUT" value={f.checkout} onChange={v=>setF(p=>({...p,checkout:v,hab:""}))} type="date"/>
          </div>

          {/* Selección de habitación */}
          <div>
            <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:.5,marginBottom:7}}>HABITACIÓN</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(70px,1fr))",gap:4,maxHeight:200,overflowY:"auto",padding:2}}>
              {habitaciones.map(h=>{
                // Bloquear si hay reserva que solapa con las fechas SELECCIONADAS actualmente
                const ci=f.checkin||"0000-00-00";
                const co=f.checkout||"9999-99-99";
                const ocupada=reservasHab.find(r=>
                  String(r.hab||"").trim()===h.num&&
                  String(r.id||"")!==String(f.id||"")&&
                  (r.estado==="ocupada"||r.estado==="reservada")&&
                  r.checkin<co&&r.checkout>ci
                );
                const isSel=f.hab===h.num;
                return(
                  <button key={h.num} onClick={()=>!ocupada&&setF(p=>({...p,hab:h.num}))} style={{
                    padding:"6px 3px",borderRadius:6,border:"1px solid",fontSize:9,fontWeight:isSel?700:400,
                    borderColor:isSel?C.accent:ocupada?C.red+"44":C.green+"44",
                    background:isSel?C.accent+"25":ocupada?"#EF444412":"#10B98108",
                    color:isSel?C.accent:ocupada?C.red+"99":C.green,
                    cursor:ocupada?"not-allowed":"pointer",
                    display:"flex",flexDirection:"column",alignItems:"center",gap:1,transition:"all .1s",
                    opacity:ocupada?.45:1,
                    position:"relative",
                  }}>
                    <span style={{fontWeight:700}}>{h.num}</span>
                    <span style={{fontSize:7,color:ocupada?C.red+"88":C.muted}}>{ocupada?"🔒 ocupada":h.tipo.slice(0,3)}</span>
                    <span style={{fontSize:7,color:C.muted}}>{h.capacidad}p</span>
                  </button>
                );
              })}
            </div>
            {f.checkin&&f.checkout&&f.checkin<f.checkout&&(

                  <span style={{fontSize:16,fontWeight:800,minWidth:22,textAlign:"center",color:C.text}}>{f.ninos||0}</span>

                </div>

              <div>
                <label style={{color:C.yellow,fontSize:10,fontWeight:700,display:"block",marginBottom:4}}>ANTICIPO / ABONO ($)</label>
                <input type="number" min="0" max={total} value={f.anticipo||0}
                  onChange={e=>setF(p=>({...p,anticipo:Math.min(total,Math.max(0,parseInt(e.target.value)||0))}))}

                  {[
                    {l:"💰 Pago total",v:total,c:C.green},
                    {l:"50%",v:Math.round(total*0.5),c:C.teal},
                    {l:"30%",v:Math.round(total*0.3),c:C.accent},
                    {l:"Sin anticipo",v:0,c:C.muted},

                    <button key={l} type="button" onClick={()=>setF(p=>({...p,anticipo:v}))}

                        background:(parseInt(f.anticipo)||0)===v?c+"22":"transparent",
                        color:(parseInt(f.anticipo)||0)===v?c:C.muted,
                        fontSize:9,fontWeight:700,cursor:"pointer",transition:"all .15s",whiteSpace:"nowrap"}}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            {hab&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div style={{background:C.green+"15",borderRadius:7,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:9,marginBottom:2}}>TOTAL</div>
                  <div style={{color:C.green,fontWeight:800,fontSize:13}}>{fmt(total)}</div>
                </div>
                <div style={{background:C.accent+"15",borderRadius:7,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:9,marginBottom:2}}>ANTICIPO</div>
                  <div style={{color:C.accent,fontWeight:800,fontSize:13}}>{fmt(parseInt(f.anticipo)||0)}</div>
                </div>
                <div style={{background:((parseInt(f.anticipo)||0)>=total?C.green:C.red)+"15",borderRadius:7,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:9,marginBottom:2}}>SALDO</div>
                  <div style={{color:(parseInt(f.anticipo)||0)>=total?C.green:C.red,fontWeight:800,fontSize:13}}>{fmt(Math.max(0,total-(parseInt(f.anticipo)||0)))}</div>
                </div>
              </div>
            )}
          </div>

          {/* Descuento */}
          {hab&&(
            <div style={{background:C.surface,borderRadius:10,padding:13,border:`1px solid ${descPct>0?C.pink:C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:descPct>0?10:0}}>
                <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:.5}}>🏷️ DESCUENTO</div>
                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                  {[0,5,10,15,20,25,30].map(pct=>(
                    <button key={pct} type="button" onClick={()=>setDescPct(pct)}
                      style={{padding:"3px 8px",borderRadius:5,border:`1.5px solid ${descPct===pct?(pct===0?C.muted:C.pink):C.border}`,
                        background:descPct===pct?(pct===0?"transparent":C.pink+"22"):"transparent",
                        color:descPct===pct?(pct===0?C.muted:C.pink):C.muted,
                        fontSize:10,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
                      {pct===0?"Sin desc.":pct+"%"}
                    </button>
                  ))}
                </div>
              </div>
              {descPct>0&&(
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.pink+"12",borderRadius:7,padding:"7px 10px"}}>
                  <span style={{fontSize:11,color:C.pink,fontWeight:700}}>🏷️ Descuento {descPct}% aplicado</span>
                  <span style={{fontSize:13,color:C.pink,fontWeight:800}}>− {fmt(descValor)}</span>
                </div>
              )}
            </div>
          )}

          {/* Resumen de cobro detallado */}
          {hab&&(
            <div style={{background:C.surface,borderRadius:10,padding:14,border:`1px solid ${C.green}33`}}>
              <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:.5,marginBottom:10}}>RESUMEN DE COBRO</div>
              <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:8}}>
                {(parseInt(f.adultos)||1)>0&&(
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                    <span style={{color:C.subtle}}>👨 {parseInt(f.adultos)||1} adulto{(parseInt(f.adultos)||1)>1?"s":""} × {fmt(precio)}/noche × {noches} noche{noches>1?"s":""}</span>
                    <span style={{fontWeight:700}}>{fmt((parseInt(f.adultos)||1)*precio*noches)}</span>
                  </div>
                )}
                {(parseInt(f.ninos)||0)>0&&(
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                    <span style={{color:C.pink}}>👦 {f.ninos} niño{f.ninos>1?"s":""} × {fmt(precio)}/noche × {noches} noche{noches>1?"s":""}</span>
                    <span style={{fontWeight:700,color:C.pink}}>{fmt(parseInt(f.ninos)*precio*noches)}</span>
                  </div>
                )}
                {(parseInt(f.mascotas)||0)>0&&(
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                    <span style={{color:C.orange}}>🐾 {f.mascotas} mascota{f.mascotas>1?"s":""} × {fmt(precio)}/noche × {noches} noche{noches>1?"s":""}</span>
                    <span style={{fontWeight:700,color:C.orange}}>{fmt(parseInt(f.mascotas)*precio*noches)}</span>
                  </div>
                )}
              </div>
              <div style={{background:C.card,borderRadius:7,padding:"6px 10px",marginBottom:8,fontSize:10,color:C.muted,display:"flex",gap:12,flexWrap:"wrap"}}>
                <span>🏠 Hab. {hab.num} · {hab.tipo}</span>
                <span>Cap. máx: <b style={{color:C.text}}>{capMax}</b> personas</span>
                <span>Precio: <b style={{color:C.green}}>{fmt(precio)}</b>/persona/noche</span>
                <span>Noches: <b style={{color:C.text}}>{noches}</b></span>
              </div>
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:C.muted,fontSize:10}}>TOTAL ESTANCIA</div>
                  <div style={{color:C.muted,fontSize:9,marginTop:1}}>{totalPagantes} persona{totalPagantes>1?"s":""} × {noches} noche{noches>1?"s":""}</div>
                </div>
                <span style={{color:C.green,fontSize:24,fontWeight:900}}>{fmt(total)}</span>
              </div>
              <div style={{marginTop:5,fontSize:9,color:C.teal}}>🌊 Zonas húmedas incluidas GRATIS durante la estancia</div>
            </div>
          )}

          {err&&<div style={{background:"#EF444415",border:"1px solid #EF444440",borderRadius:7,padding:"8px 13px",color:C.red,fontSize:11}}>⚠️ {err}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:10,color:C.muted,fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
            <button onClick={save} disabled={saving} style={{background:`linear-gradient(135deg,${C.green},#059669)`,border:"none",borderRadius:7,padding:10,color:"white",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
              {saving&&<Spinner size={14} color="white"/>}✓ Confirmar Check-in
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════

function ModalEmailBaucher({item,tipo,onClose,svc,huespedes,habitaciones,showToast}){
  const huesped=tipo==="hab"?huespedes.find(x=>x.id===item.huesped_id):null;
  const[tab,setTab]=useState("whatsapp");// "whatsapp" | "correo"
  const[telefono,setTelefono]=useState(()=>String(huesped?.telefono||"").replace(/\D/g,""));
  const[correo,setCorreo]=useState(huesped?.correo||"");
  const[enviando,setEnviando]=useState(false);
  const[ok,setOk]=useState(false);

  const hoy=new Date();
  const fmtHoy=`${String(hoy.getDate()).padStart(2,"0")}/${String(hoy.getMonth()+1).padStart(2,"0")}/${hoy.getFullYear()}`;
  const folio=`HC-${tipo==="hab"?"HAB":"ZON"}-${String(item.id).slice(-6).toUpperCase()}`;
  const PAGO_LABELS={pendiente:"⏳ Pendiente",efectivo:"💵 Efectivo",tarjeta:"💳 Tarjeta",transferencia:"🏦 Transferencia",cortesia:"🎁 Cortesía"};

  // ── Calcular datos ──────────────────────────────────────────────
  let cliente="",cedula="",infoLinea="",detalles=[],totalVal=0,anticipoVal=0,saldoVal=0,pagoInfo="";
  if(tipo==="hab"){
    const hab=habitaciones.find(x=>x.num===item.hab);
    const ad=parseInt(item.adultos)||1,ni=parseInt(item.ninos)||0,ma=parseInt(item.mascotas)||0;
    const tp=ad+ni+ma;const noches=parseInt(item.noches)||1;
    const precio=hab?.precio||parseInt(item.precio_noche)||0;
    cliente=`${huesped?.nombre||""} ${huesped?.apellidos||""}`.trim()||"—";
    cedula=huesped?.cedula||"—";
    infoLinea=`🏠 Habitación ${item.hab} · Check-in: ${fmtFecha(item.checkin)} · Check-out: ${fmtFecha(item.checkout)}`;
    totalVal=precio*tp*noches;anticipoVal=parseInt(item.anticipo)||0;saldoVal=Math.max(0,totalVal-anticipoVal);pagoInfo=item.pago||"pendiente";
    detalles=[
      `${ad} adulto${ad>1?"s":""} × ${fmt(precio)}/noche × ${noches} noche${noches>1?"s":""} = ${fmt(ad*precio*noches)}`,
      ...(ni>0?[`${ni} niño${ni>1?"s":""} × ${fmt(precio)}/noche × ${noches} noche${noches>1?"s":""} = ${fmt(ni*precio*noches)}`]:[]),
      ...(ma>0?[`${ma} mascota${ma>1?"s":""} × ${fmt(precio)}/noche × ${noches} noche${noches>1?"s":""} = ${fmt(ma*precio*noches)}`]:[]),
    ];

              background:tab===k?col+"18":"transparent",color:tab===k?col:C.muted,transition:"all .15s"}}>

        </div>

        <div style={{padding:"14px 18px 18px",display:"flex",flexDirection:"column",gap:12}}>
          {/* ── PESTAÑA WHATSAPP ── */}

            <div style={{background:"#25D36612",border:"1px solid #25D36640",borderRadius:8,padding:"9px 12px",fontSize:10,color:"#25D366",fontWeight:600}}>

            <div>
              <label style={{color:C.muted,fontSize:10,fontWeight:700,display:"block",marginBottom:5}}>NÚMERO WHATSAPP (Colombia)</label>

            </div>

          <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:"8px",color:C.muted,fontSize:11,cursor:"pointer"}}>Cerrar</button>
        </div>
      </div>

function ModalReporteImpresion({reservasHab,reservas,huespedes,habitaciones,svc,repFiltro,repDesde,repHasta,repTab,onClose,reservasSalon}){
  const hoy=new Date();const hoyK=dateKey(hoy);
  const getDesde=()=>{
    if(repFiltro==="hoy")return hoyK;
    if(repFiltro==="semana"){const d=new Date(hoy);d.setDate(d.getDate()-d.getDay());return dateKey(d);}
    if(repFiltro==="mes")return`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,"0")}-01`;
    if(repFiltro==="año")return`${hoy.getFullYear()}-01-01`;
    return repDesde;
  };
  const desde=getDesde(),hasta=repFiltro==="custom"?repHasta:hoyK;
  const _dn=(a,b)=>{if(!a||!b)return 1;const[ay,am,ad]=a.split("-").map(Number);const[by,bm,bd]=b.split("-").map(Number);return Math.max(1,Math.round((new Date(by,bm-1,bd)-new Date(ay,am-1,ad))/(1000*60*60*24)));};
  const fmtHoy=`${String(hoy.getDate()).padStart(2,"0")}/${String(hoy.getMonth()+1).padStart(2,"0")}/${hoy.getFullYear()}`;
  const periodoLabel=repFiltro==="hoy"?"Hoy":repFiltro==="semana"?"Esta semana":repFiltro==="mes"?`Mes ${MESES_ES[hoy.getMonth()]} ${hoy.getFullYear()}`:repFiltro==="año"?`Año ${hoy.getFullYear()}`:`${desde} al ${hasta}`;

  const resHabF=reservasHab.filter(r=>r.checkin>=desde&&r.checkin<=hasta);
  const resZonF=reservas.filter(r=>r.date>=desde&&r.date<=hasta);

  const imprimir=()=>{

    const ingZonas=resZonF.filter(r=>r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.total)||0),0);
    const pendHab=resHabF.reduce((a,r)=>{const h=habitaciones.find(x=>x.num===r.hab);if(!h)return a;const tp=(parseInt(r.adultos)||1)+(parseInt(r.ninos)||0)+(parseInt(r.mascotas)||0);const total=h.precio*tp*_dn(r.checkin,r.checkout);return a+Math.max(0,total-(parseInt(r.anticipo)||0));},0);
    const ingSalon=resSalF.filter(r=>r.estado!=="cancelado"&&r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.anticipo)||0),0);
    const pendSalon=resSalF.filter(r=>r.estado!=="cancelado").reduce((a,r)=>a+Math.max(0,(parseInt(r.total)||0)-(parseInt(r.anticipo)||0)),0);
    const totalIngresos=ingHab+ingZonas+ingSalon;
    const EVENTO_L={boda:"💍 Boda",cumpleanos:"🎂 Cumpleaños",empresa:"🏢 Empresarial",graduacion:"🎓 Graduación",conferencia:"🎤 Conferencia",reunion:"📋 Reunión",otro:"🎪 Otro"};
