                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}><span style={{color:sv?.color||C.muted,fontWeight:700,fontSize:10}}>{sv?.icono} {sv?.nombre||r.servicio}</span></td>
                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}><div style={{fontSize:10}}>{r.hora}</div><div style={{color:C.muted,fontSize:9}}>→{minH(hMin(r.hora||"0:0")+60)}</div></td>
                          <td style={{padding:"7px 10px",fontSize:10,borderBottom:`1px solid ${C.border}10`}}>{r.adultos}A{parseInt(r.ninos)>0?` ${r.ninos}N`:""}</td>
                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={PAGO_T[r.pago]?.l||r.pago} color={PAGO_T[r.pago]?.c||C.muted}/></td>
                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={EST[r.estado]?.l||r.estado} color={EST[r.estado]?.c||C.muted}/></td>
                          <td style={{padding:"7px 10px",color:r.tipo==="huesped"?C.teal:C.green,fontWeight:700,fontSize:10,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{r.tipo==="huesped"?"GRATIS":fmt(parseInt(r.total)||0)}</td>
                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}>
                            <div style={{display:"flex",gap:3}}>
                              <button onClick={()=>{setEdit(r);setModal(true);}} style={{background:C.accent+"22",border:"none",color:C.accent,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}}>✏️</button>
                              <button onClick={()=>setReciboItem({item:r,tipo:"zona"})} style={{background:C.green+"22",border:"none",color:C.green,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}}>🧾</button>
                              {isAdmin&&<button onClick={()=>setDel(r)} style={{background:C.red+"22",border:"none",color:C.red,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}}>🗑️</button>}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {filtered.length===0&&<div style={{textAlign:"center",padding:28,color:C.muted,fontSize:12}}>Sin resultados</div>}
            </div>
          </div>
        )}

        {/* ══ SALÓN DE EVENTOS ══ */}
        {vista==="salon"&&(()=>{
          const EVENTO_LABELS={boda:"💍 Boda",cumpleanos:"🎂 Cumpleaños",empresa:"🏢 Empresarial",graduacion:"🎓 Graduación",conferencia:"🎤 Conferencia",reunion:"📋 Reunión",otro:"🎪 Otro"};
          const EST_SALON={reservado:{l:"RESERVADO",c:C.yellow},confirmado:{l:"CONFIRMADO",c:C.accent},en_curso:{l:"EN CURSO",c:C.red},completado:{l:"COMPLETADO",c:C.green},cancelado:{l:"CANCELADO",c:C.muted}};
          const filtradas=reservasSalon.filter(r=>{
            if(filtroSalon==="activos")return r.estado==="reservado"||r.estado==="confirmado"||r.estado==="en_curso";
            if(filtroSalon==="completados")return r.estado==="completado";
            if(filtroSalon==="cancelados")return r.estado==="cancelado";
            return true;
          });
          const ingSalon=reservasSalon.filter(r=>r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.anticipo)||0),0);
          const saldoTotal=reservasSalon.filter(r=>r.estado!=="cancelado").reduce((a,r)=>a+Math.max(0,(parseInt(r.total)||0)-(parseInt(r.anticipo)||0)),0);
          const proximas=reservasSalon.filter(r=>(r.estado==="reservado"||r.estado==="confirmado")&&r.fecha_inicio>=todayKey).length;
          return(
          <div style={{display:"flex",flexDirection:"column",gap:14,animation:"fadeUp .2s ease"}}>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <h2 style={{margin:0,fontSize:16,fontWeight:900,background:`linear-gradient(135deg,#7C3AED,#0EA5E9)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🎉 Salón de Eventos</h2>
                <div style={{color:C.muted,fontSize:10,marginTop:2}}>Gestión de reservas y eventos especiales</div>
              </div>
              <button onClick={()=>{setEditSalon(null);setModalSalon(true);}}
                style={{background:`linear-gradient(135deg,#7C3AED,#0EA5E9)`,border:"none",borderRadius:8,padding:"9px 18px",color:"white",fontWeight:700,cursor:"pointer",fontSize:12}}>
                + Nueva Reserva Salón
              </button>
            </div>

            {/* KPIs */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
              {[
                {l:"Total reservas",v:reservasSalon.length,c:C.accent2,i:"🎉"},
                {l:"Próximas / Activas",v:proximas,c:C.yellow,i:"📅"},
                {l:"Ingresos cobrados",v:fmt(ingSalon),c:C.green,i:"💰"},
                {l:"Saldo por cobrar",v:fmt(saldoTotal),c:saldoTotal>0?C.red:C.muted,i:"⏳"},
              ].map((k,i)=>(
                <div key={i} style={{background:C.card,borderRadius:11,padding:"12px 14px",border:`1px solid ${k.c}25`,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:8,right:10,fontSize:22,opacity:.12}}>{k.i}</div>
                  <div style={{fontSize:9,color:C.muted,fontWeight:700,marginBottom:3,letterSpacing:.5}}>{k.l.toUpperCase()}</div>
                  <div style={{color:k.c,fontSize:18,fontWeight:800}}>{k.v}</div>
                </div>
              ))}
            </div>

            {/* Filtros */}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[["todos","Todos"],["activos","📅 Activos"],["completados","✅ Completados"],["cancelados","❌ Cancelados"]].map(([k,l])=>(
                <button key={k} onClick={()=>setFiltroSalon(k)}
                  style={{padding:"5px 12px",borderRadius:20,border:`1.5px solid ${filtroSalon===k?"#7C3AED":C.border}`,background:filtroSalon===k?"#7C3AED18":"transparent",color:filtroSalon===k?"#A78BFA":C.muted,fontSize:10,fontWeight:700,cursor:"pointer"}}>
                  {l}
                </button>
              ))}
            </div>

            {/* Tabla */}
            {filtradas.length===0?(
              <div style={{textAlign:"center",padding:"40px 0",color:C.muted,background:C.card,borderRadius:11,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:40,marginBottom:8}}>🎉</div>
                <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>Sin reservas de salón</div>
                <div style={{fontSize:11}}>Crea la primera reserva con el botón de arriba</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {[...filtradas].sort((a,b)=>a.fecha_inicio>b.fecha_inicio?1:-1).map((r,idx)=>{
                  const ec=EST_SALON[r.estado]||{l:r.estado,c:C.muted};
                  const pc=PAGO_T[r.pago]||{l:r.pago||"Pendiente",c:C.yellow};
                  const total=parseInt(r.total)||0;
                  const anticipo=parseInt(r.anticipo)||0;
                  const saldo=Math.max(0,total-anticipo);
                  const esProxima=(r.estado==="reservado"||r.estado==="confirmado")&&r.fecha_inicio>=todayKey;
                  const esHoy=r.fecha_inicio===todayKey||r.fecha_fin===todayKey;
                  return(
                    <div key={r.id} style={{background:C.card,borderRadius:11,border:`1.5px solid ${esHoy?"#7C3AED88":esProxima?"#7C3AED33":C.border}`,padding:14,transition:"all .15s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:10}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:40,height:40,borderRadius:9,background:"#7C3AED22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                            {EVENTO_LABELS[r.evento]?.slice(0,2)||"🎉"}
                          </div>
                          <div>
                            <div style={{fontWeight:800,fontSize:13}}>{r.cliente_nombre||"—"}</div>
                            <div style={{color:C.muted,fontSize:10,marginTop:1}}>{EVENTO_LABELS[r.evento]||r.evento||"Evento"} · 👥 {r.personas} personas</div>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                          <Tag text={ec.l} color={ec.c}/>
                          {esHoy&&<Tag text="HOY" color="#7C3AED"/>}
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:10,background:C.surface,borderRadius:8,padding:"9px 11px"}}>
                        <div><div style={{color:C.muted,fontSize:9,fontWeight:700}}>FECHA</div><div style={{fontSize:11,fontWeight:600,marginTop:2}}>{fmtFecha(r.fecha_inicio)}{r.fecha_inicio!==r.fecha_fin?" → "+fmtFecha(r.fecha_fin):""}</div></div>
                        <div><div style={{color:C.muted,fontSize:9,fontWeight:700}}>HORARIO</div><div style={{fontSize:11,fontWeight:600,marginTop:2}}>{r.hora_inicio||"—"} — {r.hora_fin||"—"}</div></div>
                        <div><div style={{color:C.muted,fontSize:9,fontWeight:700}}>TOTAL</div><div style={{fontSize:13,fontWeight:800,color:C.green,marginTop:2}}>{fmt(total)}</div></div>
                        {anticipo>0&&<div><div style={{color:C.muted,fontSize:9,fontWeight:700}}>ANTICIPO</div><div style={{fontSize:11,fontWeight:700,color:C.accent,marginTop:2}}>{fmt(anticipo)}</div></div>}
                        {saldo>0&&<div><div style={{color:C.muted,fontSize:9,fontWeight:700}}>SALDO</div><div style={{fontSize:13,fontWeight:800,color:C.red,marginTop:2}}>{fmt(saldo)}</div></div>}
                        <div><div style={{color:C.muted,fontSize:9,fontWeight:700}}>PAGO</div><div style={{marginTop:3}}><Tag text={pc.l} color={pc.c}/></div></div>
                      </div>
                      {r.notas&&<div style={{fontSize:10,color:C.muted,marginBottom:8,padding:"5px 9px",background:C.surface,borderRadius:6,borderLeft:`3px solid #7C3AED55`}}>📝 {r.notas}</div>}
                      <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                        <button onClick={()=>{setEditSalon(r);setModalSalon(true);}} style={{background:C.accent+"22",border:"none",color:C.accent,borderRadius:6,padding:"5px 11px",cursor:"pointer",fontSize:10,fontWeight:700}}>✏️ Editar</button>
                        <button onClick={()=>setReciboSalon(r)} style={{background:C.green+"22",border:"none",color:C.green,borderRadius:6,padding:"5px 11px",cursor:"pointer",fontSize:10,fontWeight:700}}>🧾 Recibo</button>
                        {isAdmin&&<button onClick={()=>setDelSalon(r)} style={{background:C.red+"22",border:"none",color:C.red,borderRadius:6,padding:"5px 11px",cursor:"pointer",fontSize:10,fontWeight:700}}>🗑️</button>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>);
        })()}

        {/* ══ AGENDA — CALENDAR TIMELINE ══ */}
        {vista==="agenda"&&(()=>{
          // Generar array de días
          const dias=Array.from({length:calDias},(_,i)=>{
            const d=new Date(calStartDate);d.setDate(d.getDate()+i);
            return d.toISOString().slice(0,10);
          });
          const hoy=todayKey;
          // Colores por piso
          const pisoColor=(num)=>{
            const h=habitaciones.find(x=>x.num===num);
            if(!h)return C.accent;
            return h.piso===4?C.accent2:h.piso===3?C.teal:C.accent;
          };
          // Agrupar por piso
          const pisos=[
            {piso:2,label:"Piso 2",color:C.accent},
            {piso:3,label:"Piso 3",color:C.teal},
            {piso:4,label:"Suites",color:C.accent2},
          ];
          // Navegar semanas
          const navSemana=(delta)=>{
            const d=new Date(calStartDate);
            d.setDate(d.getDate()+delta*calDias);
            setCalStartDate(d.toISOString().slice(0,10));
          };
          const labelDia=(k)=>{
            const d=new Date(k+"T12:00:00");
            return{
              dia:d.toLocaleDateString("es-CO",{weekday:"short"}),
              num:d.getDate(),
              esHoy:k===hoy
            };
          };
          const COL_HAB=110;
          const COL_DIA=Math.max(44,Math.floor((window.innerWidth-COL_HAB-60)/calDias));

          return(
          <div style={{animation:"fadeUp .2s ease",display:"flex",flexDirection:"column",gap:12}}>
            {/* Header controles */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>navSemana(-1)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"6px 11px",color:C.text,cursor:"pointer",fontSize:13}}>‹</button>
                <button onClick={()=>setCalStartDate(hoy)} style={{background:C.accent+"18",border:`1px solid ${C.accent}44`,borderRadius:7,padding:"6px 12px",color:C.accent,fontWeight:700,fontSize:10,cursor:"pointer"}}>Hoy</button>
                <button onClick={()=>navSemana(1)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"6px 11px",color:C.text,cursor:"pointer",fontSize:13}}>›</button>
                <span style={{color:C.muted,fontSize:11,fontWeight:600}}>
                  {new Date(calStartDate+"T12:00:00").toLocaleDateString("es-CO",{day:"numeric",month:"short"})} — {new Date(dias[dias.length-1]+"T12:00:00").toLocaleDateString("es-CO",{day:"numeric",month:"short",year:"numeric"})}
                </span>
              </div>
              <div style={{display:"flex",gap:6}}>
                {[[7,"7 días"],[14,"14 días"],[30,"30 días"]].map(([n,l])=>(
                  <button key={n} onClick={()=>setCalDias(n)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${calDias===n?C.accent:C.border}`,background:calDias===n?C.accent+"18":"transparent",color:calDias===n?C.accent:C.muted,fontSize:10,fontWeight:700,cursor:"pointer"}}>{l}</button>
                ))}
              </div>
            </div>

            {/* Timeline grid */}
            <div style={{background:C.card,borderRadius:11,border:`1px solid ${C.border}`,overflow:"auto"}}>
              {/* Header días */}
              <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:C.surface,zIndex:5}}>
                <div style={{width:COL_HAB,minWidth:COL_HAB,padding:"8px 10px",fontSize:9,color:C.muted,fontWeight:700,borderRight:`1px solid ${C.border}`,flexShrink:0}}>HABITACIÓN</div>
                {dias.map(k=>{
                  const{dia,num,esHoy}=labelDia(k);
                  return(
                    <div key={k} style={{width:COL_DIA,minWidth:COL_DIA,flexShrink:0,textAlign:"center",padding:"6px 2px",borderRight:`1px solid ${C.border}18`,background:esHoy?C.accent+"15":"transparent"}}>
                      <div style={{fontSize:8,color:esHoy?C.accent:C.muted,fontWeight:700,textTransform:"uppercase"}}>{dia}</div>
                      <div style={{fontSize:13,fontWeight:800,color:esHoy?C.accent:C.text,lineHeight:1.2}}>{num}</div>
                      {esHoy&&<div style={{width:6,height:6,borderRadius:"50%",background:C.accent,margin:"2px auto 0"}}/>}
                    </div>
                  );
                })}
              </div>

              {/* Filas por piso */}
              {pisos.map(({piso,label,color})=>{
                const habsPiso=habitaciones.filter(h=>parseInt(h.piso)===piso);
                if(!habsPiso.length)return null;
                return(
                  <React.Fragment key={piso}>
                    {/* Label piso */}
                    <div style={{display:"flex",background:color+"12",borderBottom:`1px solid ${C.border}22`}}>
                      <div style={{width:COL_HAB,minWidth:COL_HAB,padding:"5px 10px",fontSize:9,fontWeight:800,color,borderRight:`1px solid ${C.border}`,flexShrink:0,letterSpacing:.5}}>{label.toUpperCase()}</div>
                      <div style={{flex:1}}/>
                    </div>
                    {/* Fila por habitación */}
                    {habsPiso.map(h=>(
                      <div key={h.num} style={{display:"flex",borderBottom:`1px solid ${C.border}15`,minHeight:38}}>
                        {/* Label hab */}
                        <div style={{width:COL_HAB,minWidth:COL_HAB,padding:"6px 10px",borderRight:`1px solid ${C.border}`,flexShrink:0,display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontWeight:800,fontSize:11,color}}>{h.num}</span>
                          <span style={{fontSize:8,color:C.dim,textTransform:"capitalize"}}>{h.tipo}</span>
                        </div>
                        {/* Celdas por día */}
                        <div style={{display:"flex",flex:1,position:"relative"}}>
                          {dias.map((k,di)=>{
                            const esHoy=k===hoy;
                            // Buscar reserva activa en este día
                            const res=reservasHab.find(r=>String(r.hab||"").trim()===String(h.num)&&r.estado!=="disponible"&&r.checkin<=k&&r.checkout>k);
                            const esInicio=res&&res.checkin===k;
                            const esFin=res&&res.checkout===dias[di+1]||false;
                            return(
                              <div key={k} style={{width:COL_DIA,minWidth:COL_DIA,flexShrink:0,borderRight:`1px solid ${C.border}15`,background:esHoy?C.accent+"08":"transparent",position:"relative",padding:"2px 0"}}>
                                {res&&esInicio&&(()=>{
                                  // Calcular cuántos días abarca en el rango visible
                                  const fin=res.checkout;
                                  const diaFin=dias.indexOf(fin);
                                  const span=diaFin>=0?diaFin-di:dias.length-di;
                                  const huesped=huespedes.find(x=>x.id===res.huesped_id);
                                  const nombreCorto=huesped?(huesped.nombre+" "+(huesped.apellidos||"")).slice(0,18):"—";
                                  const bColor=res.estado==="ocupada"?C.red:C.yellow;
                                  let acompArr=[];
                                  try{acompArr=res.acompanantes?JSON.parse(res.acompanantes):[];}catch{}
                                  const acompTooltip=acompArr.length?`\nAcompañantes: ${acompArr.map(a=>a.nombre).join(", ")}`:"";
                                  return(
                                    <div
                                      onClick={()=>{setEditHab(res);setModalHab(true);}}
                                      style={{
                                        position:"absolute",left:2,top:3,
                                        width:`calc(${span*COL_DIA}px - 4px)`,
                                        height:32,borderRadius:5,
                                        background:`linear-gradient(135deg,${bColor}33,${bColor}18)`,
                                        border:`1.5px solid ${bColor}88`,
                                        cursor:"pointer",zIndex:2,
                                        display:"flex",alignItems:"center",
                                        padding:"0 7px",gap:4,overflow:"hidden",
                                        transition:"all .12s"
                                      }}
                                      title={`${nombreCorto} · ${res.checkin} → ${res.checkout}${acompTooltip}`}
                                    >
                                      <div style={{width:6,height:6,borderRadius:"50%",background:bColor,flexShrink:0}}/>
                                      <span style={{fontSize:9,fontWeight:700,color:bColor,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{nombreCorto}</span>
                                      {acompArr.length>0&&(
                                        <span style={{marginLeft:"auto",background:C.teal+"33",color:C.teal,borderRadius:3,padding:"1px 4px",fontSize:8,fontWeight:700,flexShrink:0}}>
                                          👥{acompArr.length}
                                        </span>
                                      )}
                                    </div>
                                  );
                                })()}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </React.Fragment>
                );
              })}

              {/* ── Fila Salón de Eventos ── */}
              {reservasSalon.length>0&&(
                <React.Fragment>
                  <div style={{display:"flex",background:"#7C3AED12",borderBottom:`1px solid ${C.border}22`}}>
                    <div style={{width:COL_HAB,minWidth:COL_HAB,padding:"5px 10px",fontSize:9,fontWeight:800,color:"#A78BFA",borderRight:`1px solid ${C.border}`,flexShrink:0,letterSpacing:.5}}>SALÓN EVENTOS</div>
                    <div style={{flex:1}}/>
                  </div>
                  <div style={{display:"flex",borderBottom:`1px solid ${C.border}15`,minHeight:42}}>
                    <div style={{width:COL_HAB,minWidth:COL_HAB,padding:"6px 10px",borderRight:`1px solid ${C.border}`,flexShrink:0,display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontWeight:800,fontSize:11,color:"#A78BFA"}}>🎉</span>
                      <span style={{fontSize:8,color:C.dim}}>Salón</span>
                    </div>
                    <div style={{display:"flex",flex:1,position:"relative"}}>
                      {dias.map((k,di)=>{
                        const esHoy=k===hoy;
                        const res=reservasSalon.find(r=>r.estado!=="cancelado"&&r.fecha_inicio<=k&&r.fecha_fin>=k);
                        const esInicio=res&&res.fecha_inicio===k;
                        return(
                          <div key={k} style={{width:COL_DIA,minWidth:COL_DIA,flexShrink:0,borderRight:`1px solid ${C.border}15`,background:esHoy?C.accent+"08":"transparent",position:"relative",padding:"2px 0"}}>
                            {res&&esInicio&&(()=>{
                              const diaFin=dias.indexOf(res.fecha_fin);
                              const span=diaFin>=0?diaFin-di+1:dias.length-di;
                              const bColor="#7C3AED";
                              return(
                                <div onClick={()=>{setEditSalon(res);setModalSalon(true);}}
                                  style={{position:"absolute",left:2,top:4,width:`calc(${span*COL_DIA}px - 4px)`,height:34,borderRadius:5,
                                    background:`linear-gradient(135deg,${bColor}33,${bColor}18)`,border:`1.5px solid ${bColor}88`,
                                    cursor:"pointer",zIndex:2,display:"flex",alignItems:"center",padding:"0 7px",gap:4,overflow:"hidden"}}
                                  title={`${res.cliente_nombre} · ${fmtFecha(res.fecha_inicio)} → ${fmtFecha(res.fecha_fin)}`}>
                                  <div style={{width:6,height:6,borderRadius:"50%",background:bColor,flexShrink:0}}/>
                                  <span style={{fontSize:9,fontWeight:700,color:bColor,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{res.cliente_nombre||"Evento"}</span>
                                </div>
                              );
                            })()}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </React.Fragment>
              )}
            </div>

            {/* Leyenda */}
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {[[C.red,"Ocupada"],[C.yellow,"Reservada"],[C.accent,"Hoy"],["#7C3AED","Salón"]].map(([c,l])=>(
                <div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:C.muted}}>
                  <div style={{width:12,height:12,borderRadius:3,background:c+"33",border:`1.5px solid ${c}88`}}/>
                  {l}
                </div>
              ))}
            </div>
          </div>);
        })()}

        {/* ══ REPORTES ══ */}
        {vista==="reportes"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14,animation:"fadeUp .2s ease"}}>
            {/* ── Selector de período (compartido) ── */}
            <div style={{background:C.card,borderRadius:11,padding:13,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:.5}}>📅 PERÍODO</div>
                <button onClick={()=>setReportePrintModal(true)} style={{background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:6,padding:"5px 12px",color:"white",fontWeight:700,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                  🖨️ Imprimir Reporte
                </button>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:repFiltro==="custom"?10:0}}>
                {[["hoy","Hoy"],["semana","Esta semana"],["mes","Este mes"],["año","Este año"],["custom","Personalizado"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setRepFiltro(v)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:10,fontWeight:700,
                    borderColor:repFiltro===v?C.accent:C.border,background:repFiltro===v?"#0EA5E915":C.surface,color:repFiltro===v?C.accent:C.muted}}>
                    {l}
                  </button>
                ))}
              </div>
              {repFiltro==="custom"&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:8}}>
                  <Inp label="DESDE" value={repDesde} onChange={setRepDesde} type="date"/>
                  <Inp label="HASTA" value={repHasta} onChange={setRepHasta} type="date"/>
                </div>
              )}
            </div>

            {/* ── Pestañas Habitaciones | Zonas | Salón ── */}
            <div style={{display:"flex",gap:0,background:C.surface,borderRadius:10,padding:3,border:`1px solid ${C.border}`}}>
              {[["hab","🏠 Habitaciones",C.accent],["zonas","🌊 Zonas Húmedas",C.teal],["salon","🎉 Salón Eventos","#7C3AED"]].map(([k,l,col])=>(
                <button key={k} onClick={()=>setRepTab(k)} style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,transition:"all .2s",
                  background:repTab===k?col+"22":"transparent",color:repTab===k?col:C.muted,borderBottom:repTab===k?`2px solid ${col}`:"2px solid transparent"}}>
                  {l}
                </button>
              ))}
            </div>

            {/* ── Contenido dinámico por pestaña ── */}
            {(()=>{
              const hoy=new Date();const hoyK=dateKey(hoy);
              const getDesde=()=>{
                if(repFiltro==="hoy")return hoyK;
                if(repFiltro==="semana"){const d=new Date(hoy);d.setDate(d.getDate()-d.getDay());return dateKey(d);}
                if(repFiltro==="mes")return`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,"0")}-01`;
                if(repFiltro==="año")return`${hoy.getFullYear()}-01-01`;
                return repDesde;
              };
              const desde=getDesde(),hasta=repFiltro==="custom"?repHasta:hoyK;
              const _dn=(a,b)=>{if(!a||!b)return 1;const[ay,am,ad]=a.split("-").map(Number);const[by,bm,bd]=b.split("-").map(Number);return Math.max(1,Math.round((new Date(by,bm-1,bd)-new Date(ay,am-1,ad))/(1000*60*60*24)));};

              /* ═══ PESTAÑA HABITACIONES ═══ */
              if(repTab==="hab"){
                const resHabF=reservasHab.filter(r=>r.checkin>=desde&&r.checkin<=hasta);
                const ingHab=resHabF.reduce((a,r)=>{const h=habitaciones.find(x=>x.num===r.hab);if(!h)return a;const tp=(parseInt(r.adultos)||1)+(parseInt(r.ninos)||0)+(parseInt(r.mascotas)||0);return a+h.precio*tp*_dn(r.checkin,r.checkout);},0);
                const pendHab=resHabF.reduce((a,r)=>{const h=habitaciones.find(x=>x.num===r.hab);if(!h)return a;const tp=(parseInt(r.adultos)||1)+(parseInt(r.ninos)||0)+(parseInt(r.mascotas)||0);const total=h.precio*tp*_dn(r.checkin,r.checkout);return a+Math.max(0,total-(parseInt(r.anticipo)||0));},0);
                const nochesTotales=resHabF.reduce((a,r)=>a+_dn(r.checkin,r.checkout),0);
                const hoyCI=reservasHab.filter(r=>r.checkin===hoyK&&r.estado!=="disponible").length;
                const hoyCO=reservasHab.filter(r=>r.checkout===hoyK&&r.estado!=="disponible").length;
                return(<>
                  {/* KPIs Habitaciones */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
                    {[
                      {l:"Ingresos del período",v:fmt(ingHab),c:C.accent,i:"💰"},
                      {l:"Saldos pendientes",v:fmt(pendHab),c:C.yellow,i:"⏳"},
                      {l:"Reservas en período",v:resHabF.length,c:C.teal,i:"📋"},
                      {l:"Noches ocupadas",v:nochesTotales,c:C.green,i:"🌙"},
                      {l:"Check-ins hoy",v:hoyCI,c:C.accent2,i:"🔑"},
                      {l:"Check-outs hoy",v:hoyCO,c:C.pink,i:"🏁"},
                    ].map((k,i)=>(
                      <div key={i} style={{background:C.card,borderRadius:10,padding:12,border:`1px solid ${k.c}20`}}>
                        <div style={{fontSize:16,marginBottom:4}}>{k.i}</div>
                        <div style={{color:k.c,fontSize:18,fontWeight:800}}>{k.v}</div>
                        <div style={{color:C.muted,fontSize:9,marginTop:2}}>{k.l}</div>
                      </div>
                    ))}
                  </div>

                  {/* Checkins y Checkouts del día */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    {[{label:"🔑 Check-ins Hoy",filter:r=>r.checkin===hoyK,color:C.accent2},{label:"🏁 Check-outs Hoy",filter:r=>r.checkout===hoyK,color:C.pink}].map(({label,filter,color})=>{
                      const lista=reservasHab.filter(filter);
                      return(
                        <div key={label} style={{background:C.card,borderRadius:11,padding:14,border:`1px solid ${color}22`}}>
                          <div style={{fontWeight:700,fontSize:11,color:color,marginBottom:9}}>{label} ({lista.length})</div>
                          {lista.length===0?<div style={{color:C.muted,fontSize:10,textAlign:"center",padding:"12px 0"}}>Sin movimientos hoy</div>:
                            lista.map(r=>{const hg=huespedes.find(x=>x.id===r.huesped_id);return(
                              <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${C.border}15`,fontSize:10}}>
                                <div><div style={{fontWeight:600}}>{hg?.nombre} {hg?.apellidos}</div><div style={{color:C.muted,fontSize:9}}>Hab. {r.hab}</div></div>
                                <Tag text={PAGO_T[r.pago]?.l||r.pago||"Pendiente"} color={PAGO_T[r.pago]?.c||C.yellow}/>
                              </div>
                            );})
                          }
                        </div>
                      );
                    })}
                  </div>

                  {/* Tabla detalle reservas del período */}
                  {resHabF.length>0&&(
                    <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.border}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <h3 style={{margin:0,fontSize:12,fontWeight:700}}>📋 Reservas del Período ({resHabF.length})</h3>
                        <div style={{fontSize:10,color:C.muted}}>Total cobrado: <b style={{color:C.green}}>{fmt(ingHab)}</b></div>
                      </div>
                      <input placeholder="🔍 Buscar huésped, habitación o cédula..." value={busqRpt}
                        onChange={e=>setBusqRpt(e.target.value)}
                        style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 12px",color:C.text,fontSize:11,outline:"none",marginBottom:12,boxSizing:"border-box"}}/>
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
                          <thead>
                            <tr style={{background:C.surface}}>
                              {["Hab.","Huésped","Check-in","Check-out","Noches","Personas","Total","Anticipo","Saldo","Estado","Pago",""].map(h=>(
                                <th key={h} style={{padding:"7px 10px",color:C.muted,fontSize:9,fontWeight:700,textAlign:"left",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {[...resHabF].filter(r=>{if(!busqRpt)return true;const hg=huespedes.find(x=>x.id===r.huesped_id);const q=busqRpt.toLowerCase();return String(r.hab||"").toLowerCase().includes(q)||`${hg?.nombre||""} ${hg?.apellidos||""}`.toLowerCase().includes(q)||String(hg?.cedula||"").includes(q);}).sort((a,b)=>b.checkin>a.checkin?1:-1).map((r,idx)=>{
                              const hg=huespedes.find(x=>x.id===r.huesped_id);
                              const hab=habitaciones.find(x=>x.num===r.hab);
                              const tp=(parseInt(r.adultos)||1)+(parseInt(r.ninos)||0)+(parseInt(r.mascotas)||0);
                              const noches=_dn(r.checkin,r.checkout);
                              const total=hab?hab.precio*tp*noches:parseInt(r.total)||0;
                              const anticipo=parseInt(r.anticipo)||0;
                              const saldo=Math.max(0,total-anticipo);
                              const ec=EST_HAB[r.estado]||{l:r.estado,c:C.muted};
                              const pc=PAGO_T[r.pago]||{l:r.pago||"—",c:C.muted};
                              return(
                                <tr key={r.id} style={{background:idx%2===0?"transparent":C.card2}}>
                                  <td style={{padding:"6px 10px",fontSize:11,fontWeight:700,color:C.accent,borderBottom:`1px solid ${C.border}10`}}>{r.hab}</td>
                                  <td style={{padding:"6px 10px",fontSize:10,borderBottom:`1px solid ${C.border}10`}}><div style={{fontWeight:600}}>{hg?.nombre} {hg?.apellidos}</div><div style={{color:C.muted,fontSize:9}}>📞 {hg?.telefono}</div></td>
                                  <td style={{padding:"6px 10px",fontSize:10,borderBottom:`1px solid ${C.border}10`}}>{fmtFecha(r.checkin)}</td>
                                  <td style={{padding:"6px 10px",fontSize:10,borderBottom:`1px solid ${C.border}10`}}>{fmtFecha(r.checkout)}</td>
                                  <td style={{padding:"6px 10px",fontSize:10,textAlign:"center",borderBottom:`1px solid ${C.border}10`}}>{noches}</td>
                                  <td style={{padding:"6px 10px",fontSize:10,borderBottom:`1px solid ${C.border}10`}}>{tp}p</td>
                                  <td style={{padding:"6px 10px",fontSize:11,fontWeight:700,color:C.green,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{fmt(total)}</td>
                                  <td style={{padding:"6px 10px",fontSize:11,color:C.accent,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{anticipo>0?fmt(anticipo):"—"}</td>
                                  <td style={{padding:"6px 10px",fontSize:11,fontWeight:700,color:saldo>0?C.red:C.green,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{fmt(saldo)}</td>
                                  <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={ec.l} color={ec.c}/></td>
                                  <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={pc.l} color={pc.c}/></td>
                                  <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}>
                                    <div style={{display:"flex",gap:3}}>
                                      <button onClick={()=>{setEditHab(r);setModalHab(true);}} style={{background:C.accent+"22",border:"none",color:C.accent,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Editar reserva">✏️</button>
                                      <button onClick={()=>setReciboItem({item:r,tipo:"hab"})} style={{background:C.green+"22",border:"none",color:C.green,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Ver recibo">🧾</button>
                                      <button onClick={()=>setEmailModal({item:r,tipo:"hab"})} style={{background:C.teal+"22",border:"none",color:C.teal,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Enviar baucher">📧</button>
                                      {isAdmin&&<button onClick={()=>setDelReporte({...r,tipo_del:"hab"})} style={{background:C.red+"22",border:"none",color:C.red,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Eliminar">🗑️</button>}
                                    </div>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}
                  {resHabF.length===0&&<div style={{textAlign:"center",padding:32,color:C.muted,background:C.card,borderRadius:11}}><div style={{fontSize:32,marginBottom:8}}>🏠</div>Sin reservas de habitaciones en este período</div>}
                </>);
              }

              /* ═══ PESTAÑA ZONAS HÚMEDAS ═══ */
              if(repTab==="zonas"){
              const resF=reservas.filter(r=>r.date>=desde&&r.date<=hasta);
              const ingZonas=resF.filter(r=>r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.total)||0),0);
              const pendZonas=resF.filter(r=>r.pago==="pendiente").reduce((a,r)=>a+(parseInt(r.total)||0),0);
              const extZonas=resF.filter(r=>r.tipo!=="huesped");
              const cortesiaZonas=resF.filter(r=>r.tipo==="huesped");
              const maxI=Math.max(...Object.keys(svc).map(sk=>resF.filter(r=>r.servicio===sk&&r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.total)||0),0)).concat([1]));
              return(<>
                {/* KPIs Zonas */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
                  {[
                    {l:"Ingresos externos",v:fmt(ingZonas),c:C.green,i:"💰"},
                    {l:"Saldos pendientes",v:fmt(pendZonas),c:C.yellow,i:"⏳"},
                    {l:"Reservas externas",v:extZonas.length,c:C.teal,i:"👥"},
                    {l:"Cortesías huéspedes",v:cortesiaZonas.length,c:C.accent2,i:"🎁"},
                    {l:"Total reservas",v:resF.length,c:C.accent,i:"📊"},
                  ].map((k,i)=>(
                    <div key={i} style={{background:C.card,borderRadius:10,padding:12,border:`1px solid ${k.c}20`}}>
                      <div style={{fontSize:16,marginBottom:4}}>{k.i}</div>
                      <div style={{color:k.c,fontSize:18,fontWeight:800}}>{k.v}</div>
                      <div style={{color:C.muted,fontSize:9,marginTop:2}}>{k.l}</div>
                    </div>
                  ))}
                </div>

                {/* Barras por servicio */}
                <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.border}`}}>
                  <h3 style={{margin:"0 0 13px",fontSize:12,fontWeight:700}}>💰 Ingresos por Servicio (Clientes Externos)</h3>
                  {Object.entries(svc).map(([k,sv])=>{
                    const rs=resF.filter(r=>r.servicio===k);
                    const rsExt=rs.filter(r=>r.tipo!=="huesped");
                    const ing=rsExt.filter(r=>r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.total)||0),0);
                    const cortesias=rs.filter(r=>r.tipo==="huesped").length;
                    return(
                      <div key={k} style={{marginBottom:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{color:sv.color,fontWeight:700,fontSize:11}}>{sv.icono} {sv.nombre}</span>
                          <span style={{fontWeight:700,fontSize:11}}>{fmt(ing)}</span>
                        </div>
                        <div style={{background:C.dim,borderRadius:3,height:6}}>
                          <div style={{height:"100%",borderRadius:3,background:`linear-gradient(90deg,${sv.color},${sv.color}88)`,width:`${(ing/maxI)*100}%`,transition:"width .8s"}}/>
                        </div>
                        <div style={{display:"flex",gap:10,marginTop:3}}>
                          <span style={{color:C.muted,fontSize:9}}>{rsExt.length} reservas externas · {fmt(ing)} cobrado</span>
                          <span style={{color:C.teal,fontSize:9}}>🎁 {cortesias} cortesías huésped</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Tabla detalle zonas */}
                {resF.length>0&&(
                  <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
                      <h3 style={{margin:0,fontSize:12,fontWeight:700}}>📋 Detalle Reservas Zonas ({resF.length})</h3>
                      <div style={{fontSize:10,color:C.muted}}>Externas: <b style={{color:C.green}}>{fmt(ingZonas)}</b></div>
                    </div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",minWidth:550}}>
                        <thead>
                          <tr style={{background:C.surface}}>
                            {["Fecha","Hora","Servicio","Cliente","Tipo","Adultos","Niños","Total","Pago","Estado",""].map(h=>(
                              <th key={h} style={{padding:"7px 10px",color:C.muted,fontSize:9,fontWeight:700,textAlign:"left",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {[...resF].sort((a,b)=>b.date>a.date?1:-1).map((r,idx)=>{
                            const sv=svc[r.servicio];
                            const esHuésped=r.tipo==="huesped";
                            const pc=PAGO_T[r.pago]||{l:r.pago||"—",c:C.muted};
                            return(
                              <tr key={r.id} style={{background:idx%2===0?"transparent":C.card2}}>
                                <td style={{padding:"6px 10px",fontSize:10,borderBottom:`1px solid ${C.border}10`}}>{fmtFecha(r.date)}</td>
                                <td style={{padding:"6px 10px",fontSize:10,color:C.accent,fontWeight:700,borderBottom:`1px solid ${C.border}10`}}>{r.hora}</td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}>{sv&&<Tag text={`${sv.icono} ${sv.nombre}`} color={sv.color}/>}</td>
                                <td style={{padding:"6px 10px",fontSize:10,borderBottom:`1px solid ${C.border}10`}}>{r.nombre||"—"}</td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={esHuésped?"🎁 Huésped":"👥 Externo"} color={esHuésped?C.teal:C.accent}/></td>
                                <td style={{padding:"6px 10px",fontSize:10,textAlign:"center",borderBottom:`1px solid ${C.border}10`}}>{r.adultos||0}</td>
                                <td style={{padding:"6px 10px",fontSize:10,textAlign:"center",borderBottom:`1px solid ${C.border}10`}}>{r.ninos||0}</td>
                                <td style={{padding:"6px 10px",fontSize:11,fontWeight:700,color:esHuésped?C.teal:C.green,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{esHuésped?"CORTESÍA":fmt(parseInt(r.total)||0)}</td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}>{!esHuésped&&<Tag text={pc.l} color={pc.c}/>}</td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={r.estado||"—"} color={r.estado==="confirmado"?C.green:r.estado==="pendiente"?C.yellow:C.muted}/></td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}>
                                  <div style={{display:"flex",gap:3}}>
                                    <button onClick={()=>setReciboItem({item:r,tipo:"zona"})} style={{background:C.accent+"22",border:"none",color:C.accent,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Ver recibo">🧾</button>
                                    {isAdmin&&<button onClick={()=>setDelReporte({...r,tipo_del:"zona"})} style={{background:C.red+"22",border:"none",color:C.red,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Eliminar">🗑️</button>}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
                {resF.length===0&&<div style={{textAlign:"center",padding:32,color:C.muted,background:C.card,borderRadius:11}}><div style={{fontSize:32,marginBottom:8}}>🌊</div>Sin reservas de zonas húmedas en este período</div>}
              </>);
              } // fin if zonas

              /* ═══ PESTAÑA SALÓN DE EVENTOS ═══ */
              if(repTab==="salon"){
              const EVENTO_LABELS_R={boda:"💍 Boda",cumpleanos:"🎂 Cumpleaños",empresa:"🏢 Empresarial",graduacion:"🎓 Graduación",conferencia:"🎤 Conferencia",reunion:"📋 Reunión",otro:"🎪 Otro"};
              const EST_SAL_R={reservado:{l:"RESERVADO",c:C.yellow},confirmado:{l:"CONFIRMADO",c:C.accent},en_curso:{l:"EN CURSO",c:C.red},completado:{l:"COMPLETADO",c:C.green},cancelado:{l:"CANCELADO",c:C.muted}};
              const resSalF=reservasSalon.filter(r=>r.fecha_inicio>=desde&&r.fecha_inicio<=hasta);
              const ingSal=resSalF.filter(r=>r.estado!=="cancelado"&&r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.anticipo)||0),0);
              const pendSal=resSalF.filter(r=>r.estado!=="cancelado").reduce((a,r)=>a+Math.max(0,(parseInt(r.total)||0)-(parseInt(r.anticipo)||0)),0);
              const totalBrutoSal=resSalF.filter(r=>r.estado!=="cancelado").reduce((a,r)=>a+(parseInt(r.total)||0),0);
              const canceladosSal=resSalF.filter(r=>r.estado==="cancelado").length;
              const completadosSal=resSalF.filter(r=>r.estado==="completado").length;
              const PAGO_CNT=[
                {pm:"efectivo",lbl:"💵 Efectivo",col:C.green},
                {pm:"tarjeta",lbl:"💳 Tarjeta",col:C.accent2},
                {pm:"transferencia",lbl:"🏦 Transferencia",col:C.accent},
                {pm:"pendiente",lbl:"⏳ Pendiente",col:C.yellow},
              ].map(x=>({...x,tot:resSalF.filter(r=>r.pago===x.pm&&r.estado!=="cancelado").reduce((a,r)=>a+(parseInt(r.anticipo)||0),0),num:resSalF.filter(r=>r.pago===x.pm).length})).filter(x=>x.num>0);
              const eventosCnt={};resSalF.forEach(r=>{if(r.evento)eventosCnt[r.evento]=(eventosCnt[r.evento]||0)+1;});
              return(<>
                {/* KPIs Salón */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
                  {[
                    {l:"Total bruto",v:fmt(totalBrutoSal),c:"#7C3AED",i:"💰"},
                    {l:"Cobrado (anticipo)",v:fmt(ingSal),c:C.green,i:"✅"},
                    {l:"Saldo por cobrar",v:fmt(pendSal),c:pendSal>0?C.red:C.muted,i:"⏳"},
                    {l:"Eventos en período",v:resSalF.length,c:C.accent,i:"🎉"},
                    {l:"Completados",v:completadosSal,c:C.teal,i:"🏁"},
                    {l:"Cancelados",v:canceladosSal,c:C.muted,i:"❌"},
                  ].map((k,i)=>(
                    <div key={i} style={{background:C.card,borderRadius:10,padding:12,border:`1px solid ${k.c}20`}}>
                      <div style={{fontSize:16,marginBottom:4}}>{k.i}</div>
                      <div style={{color:k.c,fontSize:18,fontWeight:800}}>{k.v}</div>
                      <div style={{color:C.muted,fontSize:9,marginTop:2}}>{k.l}</div>
                    </div>
                  ))}
                </div>

                {/* Distribución por tipo de evento y método de pago */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  {/* Por tipo de evento */}
                  <div style={{background:C.card,borderRadius:11,padding:14,border:`1px solid ${C.border}`}}>
                    <div style={{fontWeight:700,fontSize:12,marginBottom:11}}>🎭 Eventos por Tipo</div>
                    {Object.keys(eventosCnt).length===0
                      ?<div style={{color:C.muted,fontSize:11,textAlign:"center",padding:"10px 0"}}>Sin datos</div>
                      :Object.entries(eventosCnt).sort((a,b)=>b[1]-a[1]).map(([k,n])=>(
                        <div key={k} style={{marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:11,color:C.text}}>{EVENTO_LABELS_R[k]||k}</span>
                            <span style={{fontSize:11,fontWeight:700,color:"#A78BFA"}}>{n}</span>
                          </div>
                          <div style={{background:C.surface,borderRadius:3,height:5}}>
                            <div style={{height:"100%",borderRadius:3,background:"linear-gradient(90deg,#7C3AED,#A78BFA)",width:`${(n/resSalF.length)*100}%`,transition:"width .6s"}}/>
                          </div>
                        </div>
                    ))}
                  </div>
                  {/* Por método de pago */}
                  <div style={{background:C.card,borderRadius:11,padding:14,border:`1px solid ${C.border}`}}>
                    <div style={{fontWeight:700,fontSize:12,marginBottom:11}}>💳 Ingresos por Método</div>
                    {PAGO_CNT.length===0
                      ?<div style={{color:C.muted,fontSize:11,textAlign:"center",padding:"10px 0"}}>Sin datos</div>
                      :PAGO_CNT.map(x=>(
                        <div key={x.pm} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}18`}}>
                          <div>
                            <div style={{fontSize:11,fontWeight:700,color:x.col}}>{x.lbl}</div>
                            <div style={{fontSize:9,color:C.muted}}>{x.num} evento{x.num!==1?"s":""}</div>
                          </div>
                          <div style={{fontSize:13,fontWeight:800,color:x.col}}>{fmt(x.tot)}</div>
                        </div>
                    ))}
                  </div>
                </div>

                {/* Tabla detalle salón */}
                {resSalF.length>0?(
                  <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <h3 style={{margin:0,fontSize:12,fontWeight:700}}>📋 Reservas Salón del Período ({resSalF.length})</h3>
                      <div style={{fontSize:10,color:C.muted}}>Cobrado: <b style={{color:C.green}}>{fmt(ingSal)}</b> · Pendiente: <b style={{color:pendSal>0?C.red:C.muted}}>{fmt(pendSal)}</b></div>
                    </div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
                        <thead>
                          <tr style={{background:C.surface}}>
                            {["Cliente","Doc.","Evento","Fecha","Horario","Personas","Total","Anticipo","Saldo","Estado","Pago",""].map(h=>(
                              <th key={h} style={{padding:"7px 10px",color:C.muted,fontSize:9,fontWeight:700,textAlign:"left",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {[...resSalF].sort((a,b)=>b.fecha_inicio>a.fecha_inicio?1:-1).map((r,idx)=>{
                            const total=parseInt(r.total)||0;
                            const anticipo=parseInt(r.anticipo)||0;
                            const saldo=Math.max(0,total-anticipo);
                            const ec=EST_SAL_R[r.estado]||{l:r.estado,c:C.muted};
                            const pc=PAGO_T[r.pago]||{l:r.pago||"—",c:C.muted};
                            return(
                              <tr key={r.id} style={{background:idx%2===0?"transparent":C.card2}}>
                                <td style={{padding:"6px 10px",fontSize:11,fontWeight:700,borderBottom:`1px solid ${C.border}10`}}>{r.cliente_nombre||"—"}</td>
                                <td style={{padding:"6px 10px",fontSize:9,color:C.muted,borderBottom:`1px solid ${C.border}10`,fontFamily:"monospace"}}>{r.cliente_cedula||"—"}</td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={EVENTO_LABELS_R[r.evento]||r.evento||"—"} color="#7C3AED"/></td>
                                <td style={{padding:"6px 10px",fontSize:10,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>
                                  {fmtFecha(r.fecha_inicio)}{r.fecha_inicio!==r.fecha_fin?<><br/><span style={{color:C.muted,fontSize:9}}>→ {fmtFecha(r.fecha_fin)}</span></>:""}
                                </td>
                                <td style={{padding:"6px 10px",fontSize:9,color:C.subtle,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{r.hora_inicio||"—"}–{r.hora_fin||"—"}</td>
                                <td style={{padding:"6px 10px",fontSize:10,textAlign:"center",borderBottom:`1px solid ${C.border}10`}}>{r.personas||"—"}</td>
                                <td style={{padding:"6px 10px",fontSize:11,fontWeight:700,color:C.green,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{fmt(total)}</td>
                                <td style={{padding:"6px 10px",fontSize:11,color:C.accent,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{anticipo>0?fmt(anticipo):"—"}</td>
                                <td style={{padding:"6px 10px",fontSize:11,fontWeight:700,color:saldo>0?C.red:C.green,borderBottom:`1px solid ${C.border}10`,whiteSpace:"nowrap"}}>{fmt(saldo)}</td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={ec.l} color={ec.c}/></td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={pc.l} color={pc.c}/></td>
                                <td style={{padding:"6px 10px",borderBottom:`1px solid ${C.border}10`}}>
                                  <div style={{display:"flex",gap:3}}>
                                    <button onClick={()=>setReciboSalon(r)} style={{background:C.green+"22",border:"none",color:C.green,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Ver recibo">🧾</button>
                                    <button onClick={()=>{setEditSalon(r);setModalSalon(true);}} style={{background:C.accent+"22",border:"none",color:C.accent,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Editar">✏️</button>
                                    {isAdmin&&<button onClick={()=>setDelSalon(r)} style={{background:C.red+"22",border:"none",color:C.red,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}} title="Eliminar">🗑️</button>}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                ):<div style={{textAlign:"center",padding:32,color:C.muted,background:C.card,borderRadius:11}}><div style={{fontSize:32,marginBottom:8}}>🎉</div>Sin reservas de salón en este período</div>}
              </>);
              } // fin if salon
            })()}
          </div>
        )}

        {/* ══ CONFIGURACIÓN ══ */}
        {vista==="config"&&isAdmin&&(
          <div style={{animation:"fadeUp .2s ease",display:"flex",flexDirection:"column",gap:20}}>

            {/* ── Logo e identidad ── */}
            <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.border}`}}>
              <h2 style={{margin:"0 0 14px",fontSize:15,fontWeight:700}}>🏨 Identidad del Hotel</h2>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>NOMBRE DEL HOTEL</label>
                  <input value={nombreHotel} onChange={e=>setNombreHotel(e.target.value)}
                    style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"}}/>
                </div>
                <div>
                  <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>LOGO (imagen desde PC)</label>
                  <input type="file" accept="image/*" onChange={e=>{
                    const file=e.target.files[0];
                    if(!file)return;
                    const reader=new FileReader();
                    reader.onload=ev=>{setLogoUrl(ev.target.result);};
                    reader.readAsDataURL(file);
                  }} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 8px",color:C.muted,fontSize:10,outline:"none",width:"100%",cursor:"pointer"}}/>
                </div>
              </div>
              {logoUrl&&(
                <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}>
                  <img src={logoUrl} alt="preview" style={{width:50,height:50,borderRadius:8,objectFit:"cover",border:`1px solid ${C.border}`}}/>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:C.text}}>{nombreHotel}</div>
                    <div style={{fontSize:9,color:C.muted,marginTop:2}}>Vista previa del logo</div>
                    <button onClick={()=>setLogoUrl("")} style={{marginTop:4,background:"transparent",border:`1px solid ${C.red}44`,borderRadius:4,padding:"2px 8px",color:C.red,fontSize:9,cursor:"pointer"}}>🗑 Quitar logo</button>
                  </div>
                </div>
              )}
              <button onClick={()=>{
                localStorage.setItem("hotelcala_logo",logoUrl);
                localStorage.setItem("hotelcala_nombre",nombreHotel);
                showToast("✅ Identidad guardada");
              }} style={{marginTop:12,background:`linear-gradient(135deg,${C.green},#059669)`,border:"none",borderRadius:7,padding:"8px 16px",color:"white",fontWeight:700,cursor:"pointer",fontSize:12}}>
                ✓ Guardar Identidad
              </button>
            </div>

            {/* ── Temporada Alta ── */}
            <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.accent2}30`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <h2 style={{margin:0,fontSize:15,fontWeight:700}}>🔥 Temporadas Altas</h2>
                <button onClick={()=>{
                  const nueva={id:Date.now(),nombre:"",desde:"",hasta:"",porcentaje:20};
                  setTemporadas(p=>[...p,nueva]);
                }} style={{background:C.accent2+"22",border:`1px solid ${C.accent2}44`,borderRadius:7,padding:"6px 12px",color:C.accent2,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                  + Nueva Temporada
                </button>
              </div>
              {temporadas.length===0&&(
                <div style={{color:C.muted,fontSize:12,textAlign:"center",padding:"20px 0"}}>Sin temporadas configuradas. Agrega una para aplicar precio especial.</div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {temporadas.map((t,i)=>(
                  <div key={t.id} style={{background:C.surface,borderRadius:9,padding:12,border:`1px solid ${C.accent2}20`,display:"grid",gridTemplateColumns:"1fr 1fr 1fr 80px 32px",gap:8,alignItems:"end"}}>
                    <div>
                      <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:3}}>NOMBRE</label>
                      <input value={t.nombre} placeholder="Ej: Semana Santa" onChange={e=>{const n=[...temporadas];n[i]={...n[i],nombre:e.target.value};setTemporadas(n);}}
                        style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"6px 8px",color:C.text,fontSize:11,outline:"none",width:"100%"}}/>
                    </div>
                    <div>
                      <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:3}}>DESDE</label>
                      <input type="date" value={t.desde} onChange={e=>{const n=[...temporadas];n[i]={...n[i],desde:e.target.value};setTemporadas(n);}}
                        style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"6px 8px",color:C.text,fontSize:11,outline:"none",width:"100%"}}/>
                    </div>
                    <div>
                      <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:3}}>HASTA</label>
                      <input type="date" value={t.hasta} onChange={e=>{const n=[...temporadas];n[i]={...n[i],hasta:e.target.value};setTemporadas(n);}}
                        style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"6px 8px",color:C.text,fontSize:11,outline:"none",width:"100%"}}/>
                    </div>
                    <div>
                      <label style={{color:C.accent2,fontSize:9,fontWeight:700,display:"block",marginBottom:3}}>INCREMENTO %</label>
                      <div style={{display:"flex",alignItems:"center",gap:3}}>
                        <input type="number" value={t.porcentaje} min={0} max={200} onChange={e=>{const n=[...temporadas];n[i]={...n[i],porcentaje:+e.target.value};setTemporadas(n);}}
                          style={{background:C.card,border:`1px solid ${C.accent2}55`,borderRadius:5,padding:"6px 8px",color:C.accent2,fontSize:12,fontWeight:700,outline:"none",width:"100%"}}/>
                        <span style={{color:C.accent2,fontSize:11,fontWeight:700}}>%</span>
                      </div>
                    </div>
                    <button onClick={()=>setTemporadas(p=>p.filter(x=>x.id!==t.id))}
                      style={{background:C.red+"18",border:`1px solid ${C.red}33`,borderRadius:5,width:32,height:32,color:C.red,cursor:"pointer",fontSize:14}}>🗑</button>
                  </div>
                ))}
              </div>
              {temporadas.length>0&&(
                <div style={{marginTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:10,color:C.muted}}>💡 El precio se multiplica automáticamente al hacer check-in en temporada alta</div>
                  <button onClick={()=>{
                    localStorage.setItem("hotelcala_temporadas",JSON.stringify(temporadas));
                    showToast("✅ Temporadas guardadas");
                  }} style={{background:`linear-gradient(135deg,${C.accent2},#7C3AED)`,border:"none",borderRadius:7,padding:"8px 16px",color:"white",fontWeight:700,cursor:"pointer",fontSize:12,whiteSpace:"nowrap"}}>
                    ✓ Guardar Temporadas
                  </button>
                </div>
              )}
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h2 style={{margin:0,fontSize:15,fontWeight:700}}>🌊 Precios Zonas Húmedas</h2>
                {cfgEdit&&<button onClick={guardarConfig} disabled={saving} style={{background:`linear-gradient(135deg,${C.green},#059669)`,border:"none",borderRadius:7,padding:"8px 15px",color:"white",fontWeight:700,cursor:"pointer",fontSize:12}}>
                  {saving&&<Spinner size={12} color="white"/>} ✓ Guardar
                </button>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(235px,1fr))",gap:12}}>
                {Object.entries(cfgEdit||svc).map(([k,sv])=>(
                  <div key={k} style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${sv.color}30`}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:13}}>
                      <span style={{fontSize:22}}>{sv.icono}</span>
                      <div style={{color:sv.color,fontWeight:700,fontSize:13}}>{sv.nombre}</div>
                    </div>
                    {[{l:"PRECIO EXTERNO ADULTO (COP/h)",k2:"precio_adulto"},{l:"PRECIO EXTERNO NIÑO (COP/h)",k2:"precio_nino"},{l:"CAPACIDAD MÁXIMA",k2:"capacidad"}].map(({l,k2})=>(
                      <div key={k2} style={{marginBottom:9}}>
                        <label style={{color:k2==="precio_nino"?C.pink:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:2}}>{l}</label>
                        <input type="number" value={(cfgEdit||svc)[k][k2]} onChange={e=>{const n={...(cfgEdit||svc)};n[k]={...n[k],[k2]:+e.target.value};setCfgEdit(n);}}
                          style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 9px",color:C.text,fontSize:11,outline:"none",width:"100%"}}/>
                      </div>
                    ))}
                    <div style={{background:`${C.teal}15`,border:`1px solid ${C.teal}33`,borderRadius:6,padding:"6px 10px",fontSize:10,color:C.teal}}>🏨 Huéspedes: siempre GRATIS</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Config Habitaciones */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h2 style={{margin:0,fontSize:15,fontWeight:700}}>🏠 Precios y Capacidad de Habitaciones</h2>
                <div style={{display:"flex",gap:7}}>
                  {!cfgHabs&&(
                    <button onClick={()=>setCfgHabs(habitaciones.map(h=>({...h})))}
                      style={{background:C.accent+"22",border:`1px solid ${C.accent}44`,borderRadius:7,padding:"7px 14px",color:C.accent,fontWeight:700,cursor:"pointer",fontSize:12}}>
                      ✏️ Editar Precios
                    </button>
                  )}
                  {cfgHabs&&(
                    <>
                      <button onClick={()=>setCfgHabs(null)}
                        style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 14px",color:C.muted,fontWeight:700,cursor:"pointer",fontSize:12}}>
                        Cancelar
                      </button>
                      <button onClick={async()=>{
                        setSaving(true);
                        try{
                          const updated=cfgHabs.map(h=>({...h,precio:parseInt(h.precio)||0,capacidad:parseInt(h.capacidad)||1}));
                          if(gasConfigured()){
                            const res=await gasPost({action:"guardarHabitaciones",habitaciones:updated});
                            if(res.ok){
                              setHabitaciones(updated);
                              setCfgHabs(null);
                              showToast("✅ Precios guardados correctamente");
                              setTimeout(()=>cargarDatos(true),1500);
                            }else showToast("Error al guardar: "+(res.msg||""),"err");
                          }else{
                            setHabitaciones(updated);setCfgHabs(null);showToast("Habitaciones actualizadas (demo)");
                          }
                        }catch{showToast("Error de conexión","err");}
                        finally{setSaving(false);}
                      }} disabled={saving} style={{background:`linear-gradient(135deg,${C.green},#059669)`,border:"none",borderRadius:7,padding:"7px 14px",color:"white",fontWeight:700,cursor:saving?"wait":"pointer",fontSize:12,display:"flex",alignItems:"center",gap:6}}>
                        {saving&&<Spinner size={12} color="white"/>}💾 Guardar en Sheets
                      </button>
                    </>
                  )}
                </div>
              </div>
              {cfgHabs&&(
                <div style={{background:C.yellow+"12",border:`1px solid ${C.yellow}33`,borderRadius:7,padding:"7px 12px",fontSize:10,color:C.yellow,marginBottom:10}}>
                  ✏️ Modo edición activo — modifica los precios y capacidades, luego presiona <b>Guardar en Sheets</b>
                </div>
              )}
              <div style={{background:C.card,borderRadius:11,border:`1px solid ${C.border}`,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:C.surface}}>
                        {["Habitación","Piso","Tipo","Capacidad","Precio / Noche"].map(h=>(
                          <th key={h} style={{padding:"8px 12px",color:C.muted,fontSize:9,fontWeight:700,textAlign:"left",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {(cfgHabs||habitaciones).map((h,idx)=>(
                        <tr key={h.num} style={{background:idx%2===0?"transparent":C.card2}}>
                          <td style={{padding:"7px 12px",fontWeight:700,fontSize:11,color:C.accent,borderBottom:`1px solid ${C.border}10`}}>{h.num}</td>
                          <td style={{padding:"7px 12px",fontSize:10,color:C.muted,borderBottom:`1px solid ${C.border}10`}}>{h.piso===4?"Suite":h.piso}</td>
                          <td style={{padding:"7px 12px",borderBottom:`1px solid ${C.border}10`}}><Tag text={h.tipo.toUpperCase()} color={h.piso===4?C.accent2:h.piso===3?C.teal:C.accent}/></td>
                          <td style={{padding:"7px 12px",borderBottom:`1px solid ${C.border}10`}}>
                            <input type="text" inputMode="numeric" value={(cfgHabs||habitaciones)[idx].capacidad}
                              onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");const n=[...(cfgHabs||habitaciones)];n[idx]={...n[idx],capacidad:v===""?0:parseInt(v)};setCfgHabs(n);}}
                              onFocus={e=>e.target.select()}
                              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:5,padding:"4px 8px",color:C.text,fontSize:11,outline:"none",width:60,MozAppearance:"textfield",appearance:"textfield"}}/>
                          </td>
                          <td style={{padding:"7px 12px",borderBottom:`1px solid ${C.border}10`}}>
                            <input type="text" inputMode="numeric" value={(cfgHabs||habitaciones)[idx].precio}
                              onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");const n=[...(cfgHabs||habitaciones)];n[idx]={...n[idx],precio:v===""?0:parseInt(v)};setCfgHabs(n);}}
                              onFocus={e=>e.target.select()}
                              placeholder="Ej: 130000"
                              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:5,padding:"4px 8px",color:C.green,fontWeight:700,fontSize:11,outline:"none",width:120}}/>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            {/* ── Gestión de Usuarios ── */}
            <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <h2 style={{margin:0,fontSize:15,fontWeight:700}}>👥 Usuarios del Sistema</h2>
                <button onClick={()=>{setEditUsuario(null);setUForm({user:"",pass:"",role:"recepcion",nombre:""});setModalUsuario(true);}}
                  style={{background:C.accent+"22",border:`1px solid ${C.accent}44`,borderRadius:7,padding:"6px 14px",color:C.accent,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                  + Nuevo Usuario
                </button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {usuarios.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:"16px 0"}}>Sin usuarios cargados. Sincroniza primero.</div>}
                {usuarios.map(u=>(
                  <div key={u.user} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:C.surface,borderRadius:9,border:`1px solid ${C.border}`}}>
                    <div style={{width:36,height:36,borderRadius:8,background:u.role==="admin"?C.accent2+"22":C.teal+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                      {u.role==="admin"?"👑":"🧑‍💼"}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:12}}>{u.nombre}</div>
                      <div style={{fontSize:10,color:C.muted}}>@{u.user} · <span style={{color:u.role==="admin"?C.accent2:C.teal}}>{u.role==="admin"?"Administrador":"Recepción"}</span></div>
                    </div>
                    {u.user===user?.user&&<span style={{fontSize:9,background:C.green+"22",color:C.green,padding:"2px 7px",borderRadius:10,fontWeight:700}}>TÚ</span>}
                    <button onClick={()=>{setEditUsuario(u);setUForm({user:u.user,pass:"",role:u.role,nombre:u.nombre});setModalUsuario(true);}}
                      style={{background:C.accent+"18",border:`1px solid ${C.accent}33`,borderRadius:6,padding:"5px 10px",color:C.accent,fontSize:10,fontWeight:700,cursor:"pointer"}}>✏️ Editar</button>
                    {u.user!==user?.user&&<button onClick={()=>delUsuario(u)}
                      style={{background:C.red+"18",border:`1px solid ${C.red}33`,borderRadius:6,padding:"5px 10px",color:C.red,fontSize:10,fontWeight:700,cursor:"pointer"}}>🗑</button>}
                  </div>
                ))}
              </div>
            </div>

          </div>
        )}

        {/* Modal Usuario */}
        {modalUsuario&&(
          <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
            <div style={{background:C.card,borderRadius:15,width:"100%",maxWidth:400,border:`1px solid ${C.border}`,animation:"fadeUp .2s ease"}}>
              <div style={{background:C.surface,padding:"13px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontWeight:700,fontSize:14}}>{editUsuario?"✏️ Editar Usuario":"➕ Nuevo Usuario"}</div>
                <button onClick={()=>setModalUsuario(false)} style={{background:C.border,border:"none",color:C.subtle,borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:15}}>×</button>
              </div>
              <div style={{padding:18,display:"flex",flexDirection:"column",gap:12}}>
                <div>
                  <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>NOMBRE COMPLETO</label>
                  <input value={uForm.nombre} onChange={e=>setUForm(p=>({...p,nombre:e.target.value}))} placeholder="Ej: María López"
                    style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 12px",color:C.text,fontSize:12,outline:"none",width:"100%"}}/>
                </div>
                <div>
                  <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>USUARIO (para iniciar sesión)</label>
                  <input value={uForm.user} onChange={e=>setUForm(p=>({...p,user:e.target.value.toLowerCase().replace(/\s/g,"")}))} placeholder="Ej: maria"
                    disabled={!!editUsuario}
                    style={{background:editUsuario?C.dim+"22":C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 12px",color:editUsuario?C.muted:C.text,fontSize:12,outline:"none",width:"100%"}}/>
                </div>
                <div>
                  <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>{editUsuario?"NUEVA CONTRASEÑA (dejar vacío para no cambiar)":"CONTRASEÑA"}</label>
                  <div style={{position:"relative"}}>
                    <input type={showPass.nuevo?"text":"password"} value={uForm.pass} onChange={e=>setUForm(p=>({...p,pass:e.target.value}))}
                      placeholder={editUsuario?"••••••••  (sin cambios)":"Mínimo 6 caracteres"}
                      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 38px 9px 12px",color:C.text,fontSize:12,outline:"none",width:"100%"}}/>
                    <button type="button" onClick={()=>setShowPass(p=>({...p,nuevo:!p.nuevo}))}
                      style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:16}}>
                      {showPass.nuevo?"🙈":"👁️"}
                    </button>
                  </div>
                </div>
                <div>
                  <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>ROL</label>
                  <div style={{display:"flex",gap:8}}>
                    {[["admin","👑 Administrador",C.accent2],["recepcion","🧑‍💼 Recepción",C.teal]].map(([r,l,c])=>(
                      <button key={r} onClick={()=>setUForm(p=>({...p,role:r}))}
                        style={{flex:1,padding:"9px",borderRadius:8,border:`2px solid ${uForm.role===r?c:C.border}`,background:uForm.role===r?c+"18":"transparent",color:uForm.role===r?c:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
                {editUsuario&&<div style={{background:C.yellow+"15",border:`1px solid ${C.yellow}33`,borderRadius:7,padding:"8px 12px",fontSize:10,color:C.yellow}}>
                  ⚠️ Si cambias el usuario activo, deberás iniciar sesión nuevamente.
                </div>}
                <button onClick={saveUsuario} disabled={saving}
                  style={{background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:8,padding:"11px",color:"white",fontWeight:700,fontSize:13,cursor:saving?"wait":"pointer",marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {saving&&<Spinner size={13} color="white"/>}{editUsuario?"💾 Guardar Cambios":"✅ Crear Usuario"}
                </button>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(r=>console.log('✅ SW registrado'))
      .catch(e=>console.log('SW error:',e));
  });
}
</script>
</body>
</html>
