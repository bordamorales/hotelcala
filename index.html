      .periodo{font-size:13px;font-weight:700;color:#1e293b;}
      .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
      .kpi{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:11px;}
      .kpi .val{font-size:17px;font-weight:800;color:#0EA5E9;}
      .kpi .lbl{font-size:9px;color:#64748B;margin-top:2px;}
      h2{font-size:13px;font-weight:700;margin:18px 0 8px;color:#0f172a;padding:6px 10px;border-radius:6px;}
      h2.hab{background:#0EA5E915;border-left:3px solid #0EA5E9;}
      h2.zon{background:#06B6D415;border-left:3px solid #06B6D4;}
      h2.sal{background:#7C3AED15;border-left:3px solid #7C3AED;color:#7C3AED;}
      table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:10px;}
      th{background:#0f172a;color:#e2e8f0;padding:7px 8px;font-size:9px;text-align:left;font-weight:700;letter-spacing:.4px;}
      th.sal-h{background:#3B0764;color:#E9D5FF;}
      td{padding:6px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
      tr:nth-child(even) td{background:#f8fafc;}
      .footer{border-top:1px solid #e2e8f0;padding-top:12px;text-align:center;font-size:9px;color:#94A3B8;margin-top:20px;}
      .no-print{background:#f0f9ff;border:1.5px solid #0EA5E9;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:11px;color:#0369a1;display:flex;justify-content:space-between;align-items:center;}
      .btn{background:#0EA5E9;color:white;border:none;border-radius:6px;padding:8px 18px;font-size:11px;font-weight:700;cursor:pointer;}
      .empty{color:#94A3B8;font-size:11px;padding:12px 0;margin-bottom:16px;}
      @media print{.no-print{display:none!important;}body{padding:16px;}}
    </style></head><body>
    <div class="no-print">
      <span>📊 <b>Reporte ${_nombreRpt}</b> · ${periodoLabel} · Generado el ${fmtHoy}</span>
      <button class="btn" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    </div>
    <div class="header">
      <div style="display:flex;align-items:center;gap:12px">
        ${_logoRpt?`<img src="${_logoRpt}" style="width:52px;height:52px;border-radius:8px;object-fit:cover;border:1px solid #e2e8f0"/>`:``}
        <div><h1>${_nombreRpt}</h1><div class="sub">REPORTE DE GESTIÓN · GENERADO ${fmtHoy}</div></div>
      </div>
      <div style="text-align:right"><div class="periodo">📅 ${periodoLabel}</div><div style="font-size:10px;color:#64748B;margin-top:3px">${desde} al ${hasta}</div></div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="val">${fmt(ingHab)}</div><div class="lbl">🏠 Ingresos habitaciones</div></div>
      <div class="kpi"><div class="val">${fmt(ingZonas)}</div><div class="lbl">🌊 Ingresos zonas (ext.)</div></div>
      <div class="kpi"><div class="val" style="color:#7C3AED">${fmt(ingSalon)}</div><div class="lbl">🎉 Ingresos salón</div></div>
      <div class="kpi"><div class="val" style="color:#10B981">${fmt(totalIngresos)}</div><div class="lbl">📊 Total general</div></div>
    </div>
    ${pendHab>0||pendSalon>0?`
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      ${pendHab>0?`<div style="background:#EF444415;border:1px solid #EF444444;border-radius:7px;padding:8px 14px;font-size:11px;color:#EF4444;font-weight:700">⏳ Saldo pend. habitaciones: ${fmt(pendHab)}</div>`:""}
      ${pendSalon>0?`<div style="background:#7C3AED15;border:1px solid #7C3AED44;border-radius:7px;padding:8px 14px;font-size:11px;color:#7C3AED;font-weight:700">⏳ Saldo pend. salón: ${fmt(pendSalon)}</div>`:""}
      ${totalDescuentos>0?`<div style="background:#EC489915;border:1px solid #EC489944;border-radius:7px;padding:8px 14px;font-size:11px;color:#EC4899;font-weight:700">🏷️ Descuentos aplicados: ${fmt(totalDescuentos)}</div>`:""}
    </div>`:""}
    <h2 class="hab">🏠 Reservas de Habitaciones (${resHabF.length})</h2>
    ${resHabF.length>0?`<table>
      <thead><tr><th>Hab.</th><th>Huésped</th><th>Check-in</th><th>Check-out</th><th>Noches</th><th>Pers.</th><th>Total</th><th>Anticipo</th><th>Saldo</th><th>Estado</th><th>Pago</th></tr></thead>
      <tbody>${habRows}</tbody></table>`:`<p class="empty">Sin reservas de habitaciones en este período.</p>`}
    <h2 class="zon">🌊 Reservas de Zonas Húmedas (${resZonF.length})</h2>
    ${resZonF.length>0?`<table>
      <thead><tr><th>Fecha</th><th>Hora</th><th>Servicio</th><th>Cliente</th><th>Tipo</th><th>Adultos</th><th>Niños</th><th>Total</th><th>Pago</th><th>Estado</th></tr></thead>
      <tbody>${zonasRows}</tbody></table>`:`<p class="empty">Sin reservas de zonas húmedas en este período.</p>`}
    <h2 class="sal">🎉 Reservas de Salón de Eventos (${resSalF.length})</h2>
    ${resSalF.length>0?`<table>
      <thead><tr><th class="sal-h">Cliente</th><th class="sal-h">Evento</th><th class="sal-h">Fecha</th><th class="sal-h">Horario</th><th class="sal-h">Pers.</th><th class="sal-h">Total</th><th class="sal-h">Anticipo</th><th class="sal-h">Saldo</th><th class="sal-h">Estado</th><th class="sal-h">Pago</th></tr></thead>
      <tbody>${salonRows}</tbody></table>`:`<p class="empty">Sin reservas de salón en este período.</p>`}
    <div class="footer">Hotel Cala · Reporte generado el ${fmtHoy} · Período: ${periodoLabel} · Total registros: ${resHabF.length+resZonF.length+resSalF.length}</div>
    <script>window.onload=()=>window.print();<\/script>
    </body></html>`);
    w.document.close();
  };

  return(
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.card,borderRadius:15,width:"100%",maxWidth:460,border:`1px solid ${C.border}`,animation:"fadeUp .2s ease"}}>
        <div style={{background:C.surface,padding:"13px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:14}}>🖨️ Reporte · {periodoLabel}</div>
          <button onClick={onClose} style={{background:C.border,border:"none",color:C.subtle,borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:15}}>×</button>
        </div>
        <div style={{padding:18,display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[
              {l:"Reservas Hab.",v:resHabF.length,c:C.accent,i:"🏠"},
              {l:"Reservas Zonas",v:resZonF.length,c:C.teal,i:"🌊"},
              {l:"Reservas Salón",v:resSalF.length,c:"#7C3AED",i:"🎉"},
            ].map((k,i)=>(
              <div key={i} style={{background:C.surface,borderRadius:9,padding:12,border:`1px solid ${k.c}22`,textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:4}}>{k.i}</div>
                <div style={{color:k.c,fontWeight:800,fontSize:18}}>{k.v}</div>
                <div style={{color:C.muted,fontSize:10,marginTop:2}}>{k.l}</div>
              </div>
            ))}
          </div>
          <div style={{background:"#7C3AED12",border:"1px solid #7C3AED33",borderRadius:8,padding:"9px 12px",fontSize:10,color:"#A78BFA"}}>
            📋 El reporte incluye <b>habitaciones + zonas húmedas + salón de eventos</b> del período seleccionado.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:10,color:C.muted,fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
            <button onClick={()=>{imprimir();onClose();}} style={{background:`linear-gradient(135deg,#7C3AED,${C.accent})`,border:"none",borderRadius:7,padding:10,color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>
              🖨️ Generar e Imprimir
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   MODAL RECIBO / FACTURA PDF
══════════════════════════════════════════ */
function ModalRecibo({item,tipo,onClose,onEmail,svc,huespedes,habitaciones}){
  const printRef=React.useRef();
  const hoy=new Date();
  const fmtHoy=`${String(hoy.getDate()).padStart(2,"0")}/${String(hoy.getMonth()+1).padStart(2,"0")}/${hoy.getFullYear()}`;

  // Folio secuencial — usa localStorage para llevar el contador
  const folio=useMemo(()=>{
    const key="hotelcala_folio_counter";
    const n=(parseInt(localStorage.getItem(key)||"0"))+1;
    localStorage.setItem(key,String(n));
    const prefix=tipo==="hab"?"HAB":"ZON";
    return`HC-${prefix}-${String(n).padStart(4,"0")}`;
  },[]);

  // Datos del huésped completos
  const huesped=tipo==="hab"?huespedes.find(x=>x.id===item.huesped_id):null;

  // Acompañantes
  let acompanantes=[];
  try{acompanantes=item.acompanantes?JSON.parse(item.acompanantes):[];}catch{}

  // Datos según tipo
  let cliente="",cedula="",tipoDoc="",habitacionInfo="",servicioInfo="",detalles=[],totalVal=0,anticipoVal=0,saldoVal=0,pagoInfo="";
  if(tipo==="hab"){
    const hab=habitaciones.find(x=>x.num===item.hab);
    const ad=parseInt(item.adultos)||1,ni=parseInt(item.ninos)||0,ma=parseInt(item.mascotas)||0;
    const tp=ad+ni+ma;
    const noches=parseInt(item.noches)||1;
    const precio=hab?.precio||parseInt(item.precio_noche)||0;
    cliente=`${huesped?.nombre||""} ${huesped?.apellidos||""}`.trim()||"—";
    cedula=huesped?.cedula||"—";
    tipoDoc=huesped?.tipo_doc||"CC";
    habitacionInfo=`Habitación ${item.hab} · ${hab?.tipo||""} · Piso ${hab?.piso||""}`;
    totalVal=precio*tp*noches;
    anticipoVal=parseInt(item.anticipo)||0;
    saldoVal=Math.max(0,totalVal-anticipoVal);
    pagoInfo=item.pago||"pendiente";
    detalles=[
      {desc:`${ad} adulto${ad>1?"s":""} × ${fmt(precio)}/noche × ${noches} noche${noches>1?"s":""}`,val:ad*precio*noches},
      ...(ni>0?[{desc:`${ni} niño${ni>1?"s":""} × ${fmt(precio)}/noche × ${noches} noche${noches>1?"s":""}`,val:ni*precio*noches}]:[]),
      ...(ma>0?[{desc:`${ma} mascota${ma>1?"s":""} × ${fmt(precio)}/noche × ${noches} noche${noches>1?"s":""}`,val:ma*precio*noches}]:[]),
    ];
  } else {
    const sv=svc[item.servicio]||{icono:"🌊",nombre:item.servicio,precio_adulto:0,precio_nino:0};
    const ad=parseInt(item.adultos)||0,ni=parseInt(item.ninos)||0;
    cliente=item.nombre||"—";
    cedula=item.cedula||"—";
    servicioInfo=`${sv.icono} ${sv.nombre} · ${item.date} · ${item.hora}–${minH(hMin(item.hora||"0:0")+60)}`;
    totalVal=parseInt(item.total)||0;
    anticipoVal=totalVal;saldoVal=0;pagoInfo=item.pago||"efectivo";
    if(item.tipo==="huesped"){detalles=[{desc:`Huésped Hotel Cala · Hab. ${item.hab||"—"} · Cortesía`,val:0}];totalVal=0;}
    else{detalles=[...(ad>0?[{desc:`${ad} adulto${ad>1?"s":""} × ${fmt(sv.precio_adulto)}/h`,val:ad*sv.precio_adulto}]:[]),...(ni>0?[{desc:`${ni} niño${ni>1?"s":""} × ${fmt(sv.precio_nino)}/h`,val:ni*sv.precio_nino}]:[])]}
  }

  const PAGO_LABELS={pendiente:"⏳ Pendiente",efectivo:"💵 Efectivo",tarjeta:"💳 Tarjeta",transferencia:"🏦 Transferencia",cortesia:"🎁 Cortesía"};
  const TIPO_DOC={CC:"Cédula de Ciudadanía",TI:"Tarjeta de Identidad",CE:"Cédula de Extranjería",PA:"Pasaporte",NIT:"NIT"};

  const imprimir=()=>{
    const _logo=localStorage.getItem("hotelcala_logo")||"";
    const _nombre=localStorage.getItem("hotelcala_nombre")||"HOTEL CALA";
    const w=window.open("","_blank","width=850,height=700");

    // Acompañantes HTML
    const acompHTML=acompanantes.length>0?`
      <div class="section">
        <div class="section-title">Acompañantes (${acompanantes.length})</div>
        <table>
          <thead><tr><th>#</th><th>Nombre</th><th>Tipo Doc.</th><th>Documento</th></tr></thead>
          <tbody>
            ${acompanantes.map((a,i)=>`<tr>
              <td style="text-align:center;color:#64748B">${i+1}</td>
              <td style="font-weight:600">${a.nombre||"—"}</td>
              <td style="color:#64748B">${TIPO_DOC[a.tipo_doc]||a.tipo_doc||"—"}</td>
              <td style="font-family:monospace">${a.documento||"—"}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>`:"";

    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Recibo ${folio}</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      body{font-family:'Segoe UI',sans-serif;background:#fff;color:#1e293b;padding:32px;max-width:750px;margin:0 auto;}
      .logo-area{display:flex;align-items:center;gap:14px;}
      .logo-img{width:64px;height:64px;border-radius:10px;object-fit:cover;border:2px solid #e2e8f0;}
      .logo-text{font-size:24px;font-weight:900;letter-spacing:3px;color:#0EA5E9;}
      .sub{font-size:10px;color:#64748B;letter-spacing:2px;margin-top:3px;}
      .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #0EA5E9;padding-bottom:18px;margin-bottom:22px;}
      .folio-box{text-align:right;}
      .folio-num{font-size:22px;font-weight:900;color:#0EA5E9;letter-spacing:1px;}
      .folio-fecha{font-size:11px;color:#64748B;margin-top:4px;}
      .section{margin-bottom:18px;}
      .section-title{font-size:9px;font-weight:800;color:#94A3B8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e2e8f0;}
      .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;}
      .info-row{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px;gap:10px;}
      .info-row .label{color:#64748B;white-space:nowrap;flex-shrink:0;}
      .info-row .val{font-weight:600;text-align:right;}
      .info-row-full{font-size:11.5px;margin-bottom:4px;display:flex;gap:8px;}
      .info-row-full .label{color:#64748B;min-width:120px;flex-shrink:0;}
      .info-row-full .val{font-weight:600;}
      table{width:100%;border-collapse:collapse;margin-top:6px;font-size:11px;}
      th{background:#f1f5f9;padding:7px 10px;font-size:9px;text-align:left;font-weight:700;color:#64748B;letter-spacing:.5px;}
      td{padding:7px 10px;border-bottom:1px solid #f8fafc;vertical-align:middle;}
      tr:nth-child(even) td{background:#fafafa;}
      .total-row td{font-weight:800;font-size:14px;color:#10B981;border-top:2px solid #e2e8f0;padding-top:10px;background:white!important;}
      .anticipo-row td{color:#0EA5E9;font-weight:700;background:white!important;}
      .saldo-row td{color:${saldoVal>0?"#EF4444":"#10B981"};font-weight:800;font-size:13px;background:white!important;}
      .badge{display:inline-block;background:#0EA5E915;color:#0EA5E9;border:1px solid #0EA5E940;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;}
      .footer{margin-top:28px;padding-top:16px;border-top:1px solid #e2e8f0;text-align:center;font-size:10px;color:#94A3B8;line-height:1.8;}
      .firma-box{margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:40px;}
      .firma-line{border-top:1px solid #cbd5e1;padding-top:6px;font-size:9px;color:#94A3B8;text-align:center;}
      @media print{body{padding:16px;}button{display:none!important;}}
    </style></head><body>
    <div class="header">
      <div class="logo-area">
        ${_logo?`<img src="${_logo}" class="logo-img" alt="logo"/>`:""}
        <div><div class="logo-text">${_nombre}</div><div class="sub">RECIBO OFICIAL DE PAGO</div></div>
      </div>
      <div class="folio-box">
        <div class="folio-num">${folio}</div>
        <div class="folio-fecha">Fecha: ${fmtHoy}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Datos del Huésped / Cliente</div>
      <div class="info-row-full"><span class="label">Nombre completo:</span><span class="val">${cliente}</span></div>
      <div class="info-row-full"><span class="label">${TIPO_DOC[tipoDoc]||"Documento"}:</span><span class="val">${cedula}</span></div>
      ${huesped?.telefono?`<div class="info-row-full"><span class="label">Teléfono:</span><span class="val">${huesped.telefono}</span></div>`:""}
      ${huesped?.correo?`<div class="info-row-full"><span class="label">Correo:</span><span class="val">${huesped.correo}</span></div>`:""}
      ${huesped?.direccion?`<div class="info-row-full"><span class="label">Dirección:</span><span class="val">${huesped.direccion}${huesped.ciudad?`, ${huesped.ciudad}`:""}${huesped.departamento?`, ${huesped.departamento}`:""}${huesped.pais&&huesped.pais!=="Colombia"?`, ${huesped.pais}`:""}</span></div>`:""}
      ${huesped?.es_juridica&&huesped?.razon_social?`<div class="info-row-full"><span class="label">Razón Social:</span><span class="val">${huesped.razon_social} · NIT: ${huesped.nit||"—"}</span></div>`:""}
    </div>

    ${tipo==="hab"?`
    <div class="section">
      <div class="section-title">Datos del Alojamiento</div>
      <div class="info-row-full"><span class="label">Habitación:</span><span class="val">${habitacionInfo}</span></div>
      <div class="info-row-full"><span class="label">Check-in:</span><span class="val">${fmtFecha(item.checkin)}</span></div>
      <div class="info-row-full"><span class="label">Check-out:</span><span class="val">${fmtFecha(item.checkout)}</span></div>
      <div class="info-row-full"><span class="label">Noches:</span><span class="val">${parseInt(item.noches)||1}</span></div>
      <div class="info-row-full"><span class="label">Ocupantes:</span><span class="val">${parseInt(item.adultos)||1} adulto${(parseInt(item.adultos)||1)>1?"s":""}${parseInt(item.ninos)>0?` · ${item.ninos} niño${parseInt(item.ninos)>1?"s":""}` : ""}${parseInt(item.mascotas)>0?` · ${item.mascotas} mascota${parseInt(item.mascotas)>1?"s":""}`:""}</span></div>
    </div>`
    :`<div class="section">
      <div class="section-title">Servicio</div>
      <div class="info-row-full"><span class="label">Detalle:</span><span class="val">${servicioInfo}</span></div>
    </div>`}

    <div class="section">
      <div class="section-title">Detalle de Cobro</div>
      <table>
        <thead><tr><th>Descripción</th><th style="text-align:right">Valor</th></tr></thead>
        <tbody>
          ${detalles.map(d=>`<tr><td>${d.desc}</td><td style="text-align:right;font-weight:600">${fmt(d.val)}</td></tr>`).join("")}
          <tr class="total-row"><td><b>TOTAL</b></td><td style="text-align:right">${fmt(totalVal)}</td></tr>
          ${anticipoVal>0&&anticipoVal<totalVal?`
          <tr class="anticipo-row"><td>Anticipo / Abono recibido</td><td style="text-align:right">− ${fmt(anticipoVal)}</td></tr>
          <tr class="saldo-row"><td><b>SALDO PENDIENTE</b></td><td style="text-align:right">${fmt(saldoVal)}</td></tr>`:""}
        </tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">Método de Pago</div>
      <span class="badge">${PAGO_LABELS[pagoInfo]||pagoInfo}</span>
      ${item.notas?`<div style="margin-top:8px;font-size:11px;color:#64748B;background:#f8fafc;padding:7px 10px;border-radius:5px;border-left:3px solid #cbd5e1">📝 ${item.notas}</div>`:""}
    </div>

    ${acompHTML}

    <div class="firma-box">
      <div class="firma-line">Firma del huésped / cliente</div>
      <div class="firma-line">Firma y sello ${_nombre}</div>
    </div>

    <div class="footer">
      ${_nombre} · Recibo N° ${folio} · Generado el ${fmtHoy}<br/>
      Gracias por su preferencia — Conserve este documento como comprobante de pago
    </div>
    <script>window.onload=()=>window.print();<\/script>
    </body></html>`);
    w.document.close();
  };

  return(
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.card,borderRadius:15,width:"100%",maxWidth:480,border:`1px solid ${C.border}`,animation:"fadeUp .2s ease",overflow:"hidden"}}>
        <div style={{background:C.surface,padding:"13px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:14}}>🧾 Recibo · {folio}</div>
          <button onClick={onClose} style={{background:C.border,border:"none",color:C.subtle,borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:15}}>×</button>
        </div>
        <div style={{padding:18,display:"flex",flexDirection:"column",gap:12}}>
          {/* Preview */}
          <div style={{background:"white",borderRadius:10,padding:16,border:`1px solid ${C.border}`,color:"#1e293b"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",borderBottom:"2px solid #0EA5E9",paddingBottom:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:16,fontWeight:900,color:"#0EA5E9",letterSpacing:2}}>🌊 HOTEL CALA</div>
                <div style={{fontSize:8,color:"#94A3B8",letterSpacing:1}}>RECIBO OFICIAL</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,color:"#0EA5E9",fontSize:13}}>{folio}</div>
                <div style={{fontSize:9,color:"#94A3B8"}}>{fmtHoy}</div>
              </div>
            </div>
            <div style={{fontSize:11,color:"#64748B",marginBottom:4,fontWeight:700}}>CLIENTE</div>
            <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:2}}>{cliente}</div>
            <div style={{fontSize:10,color:"#94A3B8",marginBottom:10}}>Cédula: {cedula}</div>
            <div style={{fontSize:11,color:"#64748B",marginBottom:4,fontWeight:700}}>{tipo==="hab"?"ALOJAMIENTO":"SERVICIO"}</div>
            <div style={{fontSize:11,color:"#1e293b",marginBottom:10}}>{tipo==="hab"?habitacionInfo:servicioInfo}</div>
            <div style={{borderTop:"1px solid #e2e8f0",paddingTop:10}}>
              {detalles.map((d,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}>
                  <span style={{color:"#64748B"}}>{d.desc}</span>
                  <span style={{fontWeight:600}}>{fmt(d.val)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"2px solid #e2e8f0",paddingTop:7,marginTop:5}}>
                <span style={{fontWeight:800,fontSize:13}}>TOTAL</span>
                <span style={{fontWeight:900,fontSize:15,color:"#10B981"}}>{fmt(totalVal)}</span>
              </div>
              {anticipoVal>0&&anticipoVal<totalVal&&(
                <>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#0EA5E9",marginTop:3}}>
                    <span>Anticipo</span><span>− {fmt(anticipoVal)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:800,color:saldoVal>0?"#EF4444":"#10B981",marginTop:2}}>
                    <span>SALDO</span><span>{fmt(saldoVal)}</span>
                  </div>
                </>
              )}
            </div>
            <div style={{marginTop:8,background:"#f1f5f9",borderRadius:5,padding:"5px 8px",fontSize:10,color:"#64748B"}}>
              Pago: <b>{PAGO_LABELS[pagoInfo]||pagoInfo}</b>
              {item.notas&&<span> · Notas: {item.notas}</span>}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9}}>
            <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:10,color:C.muted,fontSize:11,fontWeight:700,cursor:"pointer"}}>Cerrar</button>
            <button onClick={onEmail} style={{background:`${C.green}22`,border:`1px solid ${C.green}55`,borderRadius:7,padding:10,color:C.green,fontSize:11,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
              📧 Enviar
            </button>
            <button onClick={imprimir} style={{background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:7,padding:10,color:"white",fontSize:11,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
              🖨️ PDF
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════
   MODAL RESERVA SALÓN DE EVENTOS
══════════════════════════════════════════ */
function ModalSalon({onSave,onClose,editData,saving,huespedes,reservasSalon}){
  const todayKey=dateKey(new Date());
  const manana=dateKey(new Date(Date.now()+86400000));
  const init=editData??{cliente_nombre:"",cliente_cedula:"",cliente_telefono:"",huesped_id:"",
    fecha_inicio:todayKey,fecha_fin:manana,hora_inicio:"08:00",hora_fin:"18:00",
    evento:"",personas:1,notas:"",total:0,anticipo:0,pago:"pendiente",estado:"reservado"};
  const[f,setF]=useState({...init,anticipo:parseInt(init.anticipo)||0,total:parseInt(init.total)||0});
  const[err,setErr]=useState("");
  const[busqCed,setBusqCed]=useState(()=>{if(editData?.huesped_id){const h=huespedes.find(x=>x.id===editData.huesped_id);return h?.cedula||"";}return editData?.cliente_cedula||"";});
  const[sugs,setSugs]=useState([]);
  const huesped=huespedes.find(h=>h.id===f.huesped_id);
  const saldo=Math.max(0,(parseInt(f.total)||0)-(parseInt(f.anticipo)||0));

  const buscarH=(v)=>{
    setBusqCed(v);
    if(v.length<2){setSugs([]);return;}
    const res=huespedes.filter(h=>String(h.cedula||"").includes(v)||`${h.nombre} ${h.apellidos}`.toLowerCase().includes(v.toLowerCase()));
    setSugs(res.slice(0,5));
    const exacto=huespedes.find(h=>String(h.cedula||"")===v);
    if(exacto){setF(p=>({...p,huesped_id:exacto.id,cliente_nombre:`${exacto.nombre} ${exacto.apellidos}`,cliente_cedula:exacto.cedula,cliente_telefono:exacto.telefono||""}));setSugs([]);}
  };
  const selH=(h)=>{setBusqCed(h.cedula);setF(p=>({...p,huesped_id:h.id,cliente_nombre:`${h.nombre} ${h.apellidos}`,cliente_cedula:h.cedula,cliente_telefono:h.telefono||""}));setSugs([]);};
  const limpiarH=()=>{setBusqCed("");setF(p=>({...p,huesped_id:"",cliente_cedula:"",cliente_telefono:""}));};

  const save=()=>{
    if(!f.cliente_nombre.trim())return setErr("El nombre del cliente es obligatorio");
    if(!f.fecha_inicio||!f.fecha_fin)return setErr("Las fechas son obligatorias");
    if(f.fecha_inicio>f.fecha_fin)return setErr("La fecha fin debe ser igual o posterior a la fecha inicio");
    if((parseInt(f.anticipo)||0)>(parseInt(f.total)||0))return setErr("El anticipo no puede superar el total");
    const conflicto=reservasSalon.find(r=>{
      if(editData&&String(r.id)===String(editData.id))return false;
      if(r.estado==="cancelado")return false;
      return r.fecha_inicio<=f.fecha_fin&&r.fecha_fin>=f.fecha_inicio;
    });
    if(conflicto)return setErr(`⛔ Ya existe una reserva del ${fmtFecha(conflicto.fecha_inicio)} al ${fmtFecha(conflicto.fecha_fin)}`);
    setErr("");
    onSave({...f,total:parseInt(f.total)||0,anticipo:parseInt(f.anticipo)||0,saldo,personas:parseInt(f.personas)||1});
  };

  return(
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:10,overflowY:"auto"}}>
      <div style={{background:C.card,borderRadius:15,width:"100%",maxWidth:560,border:`1px solid ${C.border}`,animation:"fadeUp .2s ease",maxHeight:"97vh",overflowY:"auto"}}>
        <div style={{background:"linear-gradient(135deg,#1a0a2e,#0e1628)",padding:"13px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
          <div style={{fontWeight:700,fontSize:14,color:"#E9D5FF"}}>{editData?"✏️ Editar Reserva Salón":"🎉 Nueva Reserva — Salón de Eventos"}</div>
          <button onClick={onClose} style={{background:"#ffffff22",border:"none",color:"#E9D5FF",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:15}}>×</button>
        </div>
        <div style={{padding:18,display:"flex",flexDirection:"column",gap:13}}>

          {/* Buscar huésped */}
          <div style={{position:"relative"}}>
            <div style={{color:C.accent2,fontSize:10,fontWeight:700,letterSpacing:.5,marginBottom:6}}>🔍 BUSCAR HUÉSPED (opcional) O INGRESAR DATOS EXTERNOS</div>
            <input type="text" value={busqCed} onChange={e=>buscarH(e.target.value)}
              placeholder="Cédula o nombre del huésped registrado..."
              style={{background:C.surface,border:`1px solid ${huesped?C.green:C.border}`,borderRadius:7,padding:"9px 12px",color:C.text,fontSize:12,outline:"none",width:"100%"}}/>
            {sugs.length>0&&(
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:50,overflow:"hidden",boxShadow:"0 8px 28px #00000080",marginTop:3}}>
                {sugs.map(h=>(
                  <button key={h.id} onClick={()=>selH(h)} style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.border}22`,padding:"9px 14px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:9}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <span style={{fontSize:16}}>👤</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:12}}>{h.nombre} {h.apellidos}</div>
                      <div style={{fontSize:10,color:C.muted}}>🪪 {h.cedula} · 📞 {h.telefono}</div>
                    </div>
                  </button>
                ))}
              </div>
            )}
            {huesped&&(
              <div style={{marginTop:7,background:`${C.green}15`,border:`1px solid ${C.green}44`,borderRadius:8,padding:"9px 12px",display:"flex",alignItems:"center",gap:9}}>
                <span style={{fontSize:18}}>✅</span>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:12,color:C.green}}>{huesped.nombre} {huesped.apellidos}</div><div style={{fontSize:10,color:C.muted}}>📞 {huesped.telefono}</div></div>
                <button onClick={limpiarH} style={{background:C.red+"22",border:"none",color:C.red,borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:10}}>✕</button>
              </div>
            )}
          </div>

          {/* Datos cliente */}
          <div>
            <div style={{color:C.muted,fontSize:9,fontWeight:700,letterSpacing:.5,marginBottom:7}}>DATOS DEL CLIENTE</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <Inp label="NOMBRE COMPLETO *" value={f.cliente_nombre} onChange={v=>setF(p=>({...p,cliente_nombre:v}))} placeholder="Nombre del cliente o empresa"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <Inp label="CÉDULA / NIT" value={f.cliente_cedula||""} onChange={v=>setF(p=>({...p,cliente_cedula:v}))} placeholder="1098765432"/>
                <Inp label="TELÉFONO" value={f.cliente_telefono||""} onChange={v=>setF(p=>({...p,cliente_telefono:v}))} placeholder="3101234567"/>
              </div>
            </div>
          </div>

          {/* Fechas y horario */}
          <div>
            <div style={{color:C.muted,fontSize:9,fontWeight:700,letterSpacing:.5,marginBottom:7}}>FECHAS Y HORARIO</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <Inp label="FECHA INICIO *" value={f.fecha_inicio} onChange={v=>setF(p=>({...p,fecha_inicio:v}))} type="date"/>
              <Inp label="FECHA FIN *" value={f.fecha_fin} onChange={v=>setF(p=>({...p,fecha_fin:v}))} type="date"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <Inp label="HORA INICIO" value={f.hora_inicio||"08:00"} onChange={v=>setF(p=>({...p,hora_inicio:v}))} type="time"/>
              <Inp label="HORA FIN" value={f.hora_fin||"18:00"} onChange={v=>setF(p=>({...p,hora_fin:v}))} type="time"/>
              <Inp label="PERSONAS" value={f.personas||1} onChange={v=>setF(p=>({...p,personas:v.replace(/[^0-9]/g,"")}))} placeholder="50"/>
            </div>
          </div>

          {/* Tipo de evento */}
          <Inp label="TIPO DE EVENTO" value={f.evento||""} onChange={v=>setF(p=>({...p,evento:v}))}
            options={[{v:"",l:"— Selecciona —",disabled:true},{v:"boda",l:"💍 Boda"},{v:"cumpleanos",l:"🎂 Cumpleaños"},{v:"empresa",l:"🏢 Evento Empresarial"},{v:"graduacion",l:"🎓 Graduación"},{v:"conferencia",l:"🎤 Conferencia"},{v:"reunion",l:"📋 Reunión"},{v:"otro",l:"🎪 Otro"}]}/>

          {/* Cobros */}
          <div style={{background:C.surface,borderRadius:10,padding:13,border:`1px solid ${C.green}33`}}>
            <div style={{color:C.muted,fontSize:9,fontWeight:700,letterSpacing:.5,marginBottom:9}}>COBROS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div>
                <label style={{color:C.green,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>TOTAL A COBRAR</label>
                <input type="text" inputMode="numeric" value={f.total||0}
                  onChange={e=>setF(p=>({...p,total:e.target.value.replace(/[^0-9]/g,"")}))}
                  onFocus={e=>e.target.select()}
                  style={{background:C.card,border:`1px solid ${C.green}55`,borderRadius:7,padding:"9px 12px",color:C.green,fontSize:14,fontWeight:800,outline:"none",width:"100%"}}/>
              </div>
              <div>
                <label style={{color:C.accent,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>ANTICIPO / ABONO</label>
                <input type="text" inputMode="numeric" value={f.anticipo||0}
                  onChange={e=>setF(p=>({...p,anticipo:e.target.value.replace(/[^0-9]/g,"")}))}
                  onFocus={e=>e.target.select()}
                  style={{background:C.card,border:`1px solid ${C.accent}55`,borderRadius:7,padding:"9px 12px",color:C.accent,fontSize:14,fontWeight:800,outline:"none",width:"100%"}}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Inp label="MÉTODO DE PAGO" value={f.pago||"pendiente"} onChange={v=>setF(p=>({...p,pago:v}))}
                options={[{v:"pendiente",l:"⏳ Pendiente"},{v:"efectivo",l:"💵 Efectivo"},{v:"tarjeta",l:"💳 Tarjeta"},{v:"transferencia",l:"🏦 Transferencia"},{v:"cortesia",l:"🎁 Cortesía"}]}/>
              <Inp label="ESTADO" value={f.estado||"reservado"} onChange={v=>setF(p=>({...p,estado:v}))}
                options={[{v:"reservado",l:"📅 Reservado"},{v:"confirmado",l:"✅ Confirmado"},{v:"en_curso",l:"🔴 En Curso"},{v:"completado",l:"✔️ Completado"},{v:"cancelado",l:"❌ Cancelado"}]}/>
            </div>
            {(parseInt(f.total)||0)>0&&(
              <div style={{marginTop:9,background:saldo>0?C.red+"12":C.green+"12",borderRadius:7,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:C.muted}}>Saldo pendiente:</span>
                <span style={{fontSize:16,fontWeight:900,color:saldo>0?C.red:C.green}}>{fmt(saldo)}</span>
              </div>
            )}
          </div>

          {/* Notas */}
          <div>
            <label style={{color:C.muted,fontSize:9,fontWeight:700,display:"block",marginBottom:4}}>NOTAS / OBSERVACIONES</label>
            <textarea value={f.notas||""} onChange={e=>setF(p=>({...p,notas:e.target.value}))} rows={2}
              placeholder="Requisitos especiales, decoración, catering..."
              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:12,outline:"none",width:"100%",resize:"vertical"}}/>
          </div>

          {err&&<div style={{background:"#EF444415",border:"1px solid #EF444440",borderRadius:7,padding:"8px 13px",color:C.red,fontSize:11}}>⚠️ {err}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:10,color:C.muted,fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
            <button onClick={save} disabled={saving} style={{background:`linear-gradient(135deg,#7C3AED,#0EA5E9)`,border:"none",borderRadius:7,padding:10,color:"white",fontSize:12,fontWeight:700,cursor:saving?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
              {saving&&<Spinner size={14} color="white"/>}🎉 {editData?"Guardar Cambios":"Confirmar Reserva"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   MODAL RECIBO SALÓN
══════════════════════════════════════════ */
function ModalReciboSalon({item,onClose}){
  const hoy=new Date();
  const fmtHoy=`${String(hoy.getDate()).padStart(2,"0")}/${String(hoy.getMonth()+1).padStart(2,"0")}/${hoy.getFullYear()}`;
  const folio=`HC-SAL-${String(item.id||"").slice(-6).toUpperCase()}`;
  const EVENTO_LABELS={boda:"💍 Boda",cumpleanos:"🎂 Cumpleaños",empresa:"🏢 Evento Empresarial",graduacion:"🎓 Graduación",conferencia:"🎤 Conferencia",reunion:"📋 Reunión",otro:"🎪 Otro"};
  const PAGO_LABELS={pendiente:"⏳ Pendiente",efectivo:"💵 Efectivo",tarjeta:"💳 Tarjeta",transferencia:"🏦 Transferencia",cortesia:"🎁 Cortesía"};
  const total=parseInt(item.total)||0;
  const anticipo=parseInt(item.anticipo)||0;
  const saldo=Math.max(0,total-anticipo);
  const imprimir=()=>{
    const _logo=localStorage.getItem("hotelcala_logo")||"";
    const _nombre=localStorage.getItem("hotelcala_nombre")||"HOTEL CALA";
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Recibo Salón — ${folio}</title>
    <style>body{font-family:Arial,sans-serif;max-width:480px;margin:32px auto;color:#1e293b;padding:0 16px;}
    .hdr{text-align:center;border-bottom:3px solid #7C3AED;padding-bottom:14px;margin-bottom:18px;}
    .logo-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;}
    .logo-img{width:56px;height:56px;border-radius:10px;object-fit:cover;border:1px solid #e2e8f0;}
    .brand{font-size:20px;font-weight:900;color:#7C3AED;letter-spacing:2px;}
    .folio{font-size:11px;color:#64748B;margin-top:4px;}.row{display:flex;justify-content:space-between;margin:4px 0;font-size:12px;}
    .label{color:#64748B;}.val{font-weight:600;}.total-row{border-top:2px solid #e2e8f0;margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;font-size:16px;font-weight:900;}
    .total-val{color:#10B981;}.saldo-val{color:#EF4444;}.section{margin:14px 0;}.stitle{font-size:10px;font-weight:700;color:#64748B;letter-spacing:.8px;margin-bottom:6px;text-transform:uppercase;}
    .badge{display:inline-block;background:#7C3AED20;color:#7C3AED;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;}
    .footer{text-align:center;margin-top:28px;font-size:10px;color:#94A3B8;border-top:1px solid #e2e8f0;padding-top:12px;}
    @media print{body{margin:0;padding:0;max-width:none;}</style></head><body>
    <div class="hdr">
      <div class="logo-wrap">${_logo?`<img src="${_logo}" class="logo-img" alt="logo"/>`:"🌊"}
        <div class="brand">${_nombre}</div></div>
      <div class="folio">RECIBO SALÓN DE EVENTOS · ${folio} · ${fmtHoy}</div>
    </div>
    <div class="section"><div class="stitle">Cliente</div>
    <div class="row"><span class="label">Nombre:</span><span class="val">${item.cliente_nombre||"—"}</span></div>
    ${item.cliente_cedula?`<div class="row"><span class="label">Cédula/NIT:</span><span class="val">${item.cliente_cedula}</span></div>`:""}
    ${item.cliente_telefono?`<div class="row"><span class="label">Teléfono:</span><span class="val">${item.cliente_telefono}</span></div>`:""}
    </div>
    <div class="section"><div class="stitle">Evento</div>
    <div class="row"><span class="label">Tipo:</span><span class="val">${EVENTO_LABELS[item.evento]||item.evento||"—"}</span></div>
    <div class="row"><span class="label">Fecha:</span><span class="val">${fmtFecha(item.fecha_inicio)}${item.fecha_inicio!==item.fecha_fin?" → "+fmtFecha(item.fecha_fin):""}</span></div>
    <div class="row"><span class="label">Horario:</span><span class="val">${item.hora_inicio||"—"} — ${item.hora_fin||"—"}</span></div>
    <div class="row"><span class="label">Personas:</span><span class="val">${item.personas||"—"}</span></div>
    ${item.notas?`<div class="row"><span class="label">Notas:</span><span class="val">${item.notas}</span></div>`:""}
    </div>
    <div class="section">
    <div class="row"><span class="label">Pago:</span><span class="val">${PAGO_LABELS[item.pago]||item.pago||"—"}</span></div>
    ${anticipo>0&&anticipo<total?`<div class="row"><span class="label">Anticipo recibido:</span><span class="val" style="color:#0EA5E9">${new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0}).format(anticipo)}</span></div>`:""}
    <div class="total-row"><span>TOTAL</span><span class="total-val">${new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0}).format(total)}</span></div>
    ${saldo>0?`<div class="total-row" style="font-size:13px"><span>SALDO PENDIENTE</span><span class="saldo-val">${new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0}).format(saldo)}</span></div>`:""}
    </div>
    <div class="footer">Hotel Cala · Recibo generado el ${fmtHoy}<br>Conserve este documento como comprobante</div>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),400);
  };

function ModalCheckout({reserva,huespedes,habitaciones,saving,onCheckout,onClose}){
  const hoy=dateKey(new Date());
  const[fecha,setFecha]=useState(hoy);
  const[pago,setPago]=useState(reserva.pago||"efectivo");
  const[notas,setNotas]=useState("");
  const h=huespedes.find(x=>x.id===reserva.huesped_id);
  const hab=habitaciones.find(x=>x.num===reserva.hab);
  const _dn=(a,b)=>{if(!a||!b)return 1;const[ay,am,ad]=a.split("-").map(Number);const[by,bm,bd]=b.split("-").map(Number);return Math.max(1,Math.round((new Date(by,bm-1,bd)-new Date(ay,am-1,ad))/(1000*60*60*24)));};
  const nochesReales=Math.max(1,_dn(reserva.checkin,fecha));
  const nochesOrig=_dn(reserva.checkin,reserva.checkout);
  const tp=(parseInt(reserva.adultos)||1)+(parseInt(reserva.ninos)||0)+(parseInt(reserva.mascotas)||0);
  const precio=hab?.precio||parseInt(reserva.precio_noche)||130000;
  const totalOrig=precio*tp*nochesOrig;
  const totalReal=precio*tp*nochesReales;
  const esAnticipado=nochesReales<nochesOrig;
  return(
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.card,borderRadius:15,width:"100%",maxWidth:480,border:`1px solid #7C3AED44`,overflow:"hidden",animation:"fadeUp .2s ease"}}>
        <div style={{background:"linear-gradient(135deg,#3B0764,#1e1040)",padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#E9D5FF"}}>🏁 Checkout — Hab. {reserva.hab}</div>
            <div style={{fontSize:10,color:"#A78BFA",marginTop:2}}>{h?.nombre} {h?.apellidos}</div>
          </div>
          <button onClick={onClose} style={{background:"#ffffff22",border:"none",color:"#E9D5FF",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:16}}>×</button>
        </div>
        <div style={{padding:18,display:"flex",flexDirection:"column",gap:12}}>
          {/* Resumen original */}
          <div style={{background:C.surface,borderRadius:9,padding:11,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,fontSize:10}}>
            <div><div style={{color:C.muted,marginBottom:2}}>Check-in</div><div style={{fontWeight:700}}>{fmtFecha(reserva.checkin)}</div></div>
            <div><div style={{color:C.muted,marginBottom:2}}>Salida original</div><div style={{fontWeight:700}}>{fmtFecha(reserva.checkout)}</div></div>
            <div><div style={{color:C.muted,marginBottom:2}}>Noches reservadas</div><div style={{fontWeight:700,color:C.accent}}>{nochesOrig}</div></div>
          </div>
          {/* Fecha real de salida */}
          <div>
            <label style={{color:"#A78BFA",fontSize:10,fontWeight:700,display:"block",marginBottom:5}}>📅 FECHA REAL DE SALIDA</label>
            <input type="date" value={fecha} min={reserva.checkin} max={reserva.checkout}
              onChange={e=>setFecha(e.target.value)}
              style={{background:C.surface,border:"1px solid #7C3AED55",borderRadius:7,padding:"9px 12px",color:C.text,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"}}/>
          </div>
          {/* Cobro ajustado */}
          <div style={{background:esAnticipado?"#1a0a1a":"#0a1a0a",borderRadius:10,padding:13,border:`1px solid ${esAnticipado?"#7C3AED":C.green}33`}}>
            <div style={{color:C.muted,fontSize:10,fontWeight:700,marginBottom:9}}>💰 COBRO AJUSTADO</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center"}}>
              <div><div style={{color:C.muted,fontSize:9,marginBottom:3}}>Noches reales</div><div style={{fontWeight:800,fontSize:20,color:esAnticipado?"#A78BFA":C.green}}>{nochesReales}</div></div>
              <div><div style={{color:C.muted,fontSize:9,marginBottom:3}}>Total real</div><div style={{fontWeight:800,fontSize:16,color:C.green}}>{fmt(totalReal)}</div></div>
              <div><div style={{color:C.muted,fontSize:9,marginBottom:3}}>{esAnticipado?"Ahorro":"Sin cambio"}</div><div style={{fontWeight:800,fontSize:14,color:esAnticipado?C.yellow:C.muted}}>{esAnticipado?`-${fmt(totalOrig-totalReal)}`:fmt(0)}</div></div>
            </div>
            {esAnticipado&&<div style={{marginTop:8,background:`${C.yellow}15`,border:`1px solid ${C.yellow}33`,borderRadius:6,padding:"6px 10px",fontSize:10,color:C.yellow}}>⚡ Checkout anticipado — cobro ajustado a {nochesReales} noche{nochesReales>1?"s":""}</div>}
          </div>
          {/* Pago y notas */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <label style={{color:C.muted,fontSize:10,fontWeight:700,display:"block",marginBottom:4}}>MÉTODO DE PAGO FINAL</label>
              <select value={pago} onChange={e=>setPago(e.target.value)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:11,outline:"none",width:"100%"}}>
                <option value="efectivo">💵 Efectivo</option>
                <option value="tarjeta">💳 Tarjeta</option>
                <option value="transferencia">🏦 Transferencia</option>
                <option value="cortesia">🎁 Cortesía</option>
              </select>
            </div>
            <div>
              <label style={{color:C.muted,fontSize:10,fontWeight:700,display:"block",marginBottom:4}}>NOTAS (opcional)</label>
              <input value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Observaciones..."
                style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:11,outline:"none",width:"100%"}}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginTop:4}}>
            <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,padding:11,color:C.muted,fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
            <button onClick={()=>onCheckout(reserva,fecha,pago,notas||"Checkout anticipado")} disabled={saving}
              style={{background:"linear-gradient(135deg,#7C3AED,#5B21B6)",border:"none",borderRadius:8,padding:11,color:"white",fontSize:12,fontWeight:800,cursor:saving?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:saving?.6:1}}>
              {saving&&<Spinner size={13} color="white"/>}🏁 Confirmar Checkout
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

    setNotifs(p=>[...p,{id,titulo,mensaje,tipo,hora:new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"})}]);

      const ahora=new Date();

      reservas.filter(r=>r.date===todayK&&r.estado!=="completado"&&r.estado!=="cancelado").forEach(r=>{

    const mfecha=filtroFecha==="todos"||(filtroFecha==="hoy"&&r.date===hoy)||(filtroFecha==="semana"&&r.date>=semanaAtras)||(filtroFecha==="mes"&&r.date>=mesAtras);
    return mf&&mb&&mfecha;
  });

  const NAV=[
    {id:"dashboard",icon:"⊞",label:"Dashboard"},
    {id:"habitaciones",icon:"🏠",label:"Habitaciones"},
    {id:"huespedes",icon:"👤",label:"Huéspedes"},
    {id:"zonas",icon:"🌊",label:"Zonas Húmedas"},
    {id:"salon",icon:"🎉",label:"Salón Eventos"},
    {id:"agenda",icon:"🗓",label:"Agenda"},
    {id:"reportes",icon:"📊",label:"Reportes"},
    ...(isAdmin?[{id:"config",icon:"⚙️",label:"Configuración"}]:[]),
  ];

  if(!user)return<Login onLogin={setUser}/>;

  const SyncBadge=()=>{
    if(!gasConfigured())return<div style={{background:"#F59E0B14",border:"1px solid #F59E0B40",borderRadius:6,padding:"3px 9px",fontSize:9,color:C.yellow,fontWeight:700}}>⚠️ MODO DEMO</div>;
    const configs={syncing:{c:C.yellow,t:"Sincronizando..."},ok:{c:C.green,t:`✓ ${lastSync?lastSync.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}):"—"}`},error:{c:C.red,t:"⚠️ Sin conexión"},idle:{c:C.muted,t:"—"}};
    const cfg=configs[syncStatus]||configs.idle;
    return<div onClick={()=>cargarDatos(false)} style={{background:cfg.c+"14",border:`1px solid ${cfg.c}40`,borderRadius:6,padding:"3px 9px",fontSize:9,color:cfg.c,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>{syncStatus==="syncing"&&<Spinner size={9} color={cfg.c}/>}{cfg.t}</div>;
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",color:C.text,transition:"background .3s,color .3s"}}>
      {/* Modales */}
      {modal&&<ModalReserva reservas={reservas} onSave={saveRes} onClose={()=>{setModal(false);setEdit(null);}} editData={editItem} svc={svc} saving={saving} huespedes={huespedes} reservasHab={reservasHab}/>}
      {modalHab&&<ModalReservaHab onSave={saveResHab} onClose={()=>{setModalHab(false);setEditHab(null);}} editData={editHab} saving={saving} huespedes={huespedes} habitaciones={habitaciones} reservasHab={reservasHab} temporadas={temporadas}/>}
      {modalHuesped&&<ModalHuesped onSave={saveHuesped} onClose={()=>{setModalHuesped(false);setEditHuesped(null);}} editData={editHuesped} saving={saving}/>}
      {modalSalon&&<ModalSalon onSave={saveSalon} onClose={()=>{setModalSalon(false);setEditSalon(null);}} editData={editSalon} saving={saving} huespedes={huespedes} reservasSalon={reservasSalon}/>}
      {reciboSalon&&<ModalReciboSalon item={reciboSalon} onClose={()=>setReciboSalon(null)}/>}
      {delItem&&<ModalDel reserva={delItem} onOk={delRes} onClose={()=>setDel(null)} svc={svc} saving={saving}/>}
      {delHab&&<ModalDel reserva={{...delHab,nombre:huespedes.find(h=>h.id===delHab.huesped_id)?.nombre||"—"}} onOk={delResHabFn} onClose={()=>setDelHab(null)} svc={svc} saving={saving} esHab/>}
      {delSalon&&<ModalDel reserva={{...delSalon,nombre:delSalon.cliente_nombre||"—",servicio:"salon",date:delSalon.fecha_inicio,hora:delSalon.hora_inicio}} onOk={delSalonFn} onClose={()=>setDelSalon(null)} svc={{salon:{icono:"🎉",nombre:"Salón de Eventos"}}} saving={saving}/>}
      {delHuesped&&<ModalDel reserva={{...delHuesped,nombre:`${delHuesped.nombre} ${delHuesped.apellidos}`,total:0}} onOk={delHuespedFn} onClose={()=>setDelHuesped(null)} svc={svc} saving={saving}/>}
      {reciboItem&&<ModalRecibo item={reciboItem.item} tipo={reciboItem.tipo} onClose={()=>setReciboItem(null)} onEmail={()=>{setEmailModal(reciboItem);setReciboItem(null);}} svc={svc} huespedes={huespedes} habitaciones={habitaciones}/>}
      {emailModal&&<ModalEmailBaucher item={emailModal.item} tipo={emailModal.tipo} onClose={()=>setEmailModal(null)} svc={svc} huespedes={huespedes} habitaciones={habitaciones} showToast={showToast}/>}
      {reportePrintModal&&<ModalReporteImpresion reservasHab={reservasHab} reservas={reservas} huespedes={huespedes} habitaciones={habitaciones} svc={svc} repFiltro={repFiltro} repDesde={repDesde} repHasta={repHasta} repTab={repTab} reservasSalon={reservasSalon} onClose={()=>setReportePrintModal(false)}/>}
      {delReporte&&<ModalDel reserva={{...delReporte,nombre:delReporte.tipo_del==="hab"?(huespedes.find(h=>h.id===delReporte.huesped_id)?.nombre||"—"):(delReporte.nombre||"—")}} onOk={async()=>{setSaving(true);try{if(gasConfigured()){const action=delReporte.tipo_del==="hab"?"eliminarReservaHab":"eliminarReserva";const res=await gasPost({action,id:delReporte.id});if(res.ok){delReporte.tipo_del==="hab"?setResHab(p=>p.filter(r=>r.id!==delReporte.id)):setRes(p=>p.filter(r=>r.id!==delReporte.id));showToast("Registro eliminado","err");}}else{delReporte.tipo_del==="hab"?setResHab(p=>p.filter(r=>r.id!==delReporte.id)):setRes(p=>p.filter(r=>r.id!==delReporte.id));showToast("Eliminado (demo)","err");}setDelReporte(null);}catch{showToast("Error","err");}finally{setSaving(false);}}} onClose={()=>setDelReporte(null)} svc={svc} saving={saving}/>}
      {checkoutItem&&<ModalCheckout reserva={checkoutItem} huespedes={huespedes} habitaciones={habitaciones} saving={saving} onCheckout={hacerCheckout} onClose={()=>setCheckoutItem(null)} onRecibo={(r)=>{setCheckoutItem(null);setReciboItem({item:r,tipo:"hab"});}}/>}

      {/* Notificaciones */}
      <NotificacionesPanel notifs={notifs} onDismiss={dismissNotif}/>

      {toast&&<div style={{position:"fixed",top:12,right:12,zIndex:998,background:toast.type==="err"?"#EF444420":C.green+"20",border:`1px solid ${toast.type==="err"?C.red:C.green}55`,borderRadius:8,padding:"9px 15px",color:toast.type==="err"?C.red:C.green,fontWeight:700,fontSize:12,boxShadow:"0 8px 28px #00000060",animation:"fadeUp .2s ease",maxWidth:300}}>{toast.msg}</div>}

      {/* SIDEBAR */}
      <div className="sidebar" style={{width:192,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",position:"fixed",height:"100vh",zIndex:10}}>
        <div style={{padding:"16px 14px",borderBottom:`1px solid ${C.border}`}}>
          {logoUrl?(
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <img src={logoUrl} alt="logo" style={{width:32,height:32,borderRadius:6,objectFit:"cover",flexShrink:0}}/>
              <div className="brand" style={{fontSize:13,fontWeight:900,letterSpacing:1,background:`linear-gradient(135deg,${C.accent},${C.accent2})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{nombreHotel}</div>
            </div>
          ):(
            <div className="brand" style={{fontSize:16,fontWeight:900,letterSpacing:2,background:`linear-gradient(135deg,${C.accent},${C.accent2})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🌊 {nombreHotel}</div>
          )}
          <div className="brand-sub" style={{color:C.dim,fontSize:8,marginTop:2,fontWeight:700,letterSpacing:1}}>SISTEMA DE GESTIÓN</div>
          <button onClick={()=>setDarkMode(p=>!p)} title={darkMode?"Modo claro":"Modo oscuro"} style={{marginTop:6,background:"transparent",border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px",color:C.muted,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>{darkMode?"☀️ Modo claro":"🌙 Modo oscuro"}</button>
        </div>
        <div style={{padding:"5px 7px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{background:C.card,borderRadius:7,padding:"7px 9px"}}>
            <div className="user-name" style={{fontSize:11,fontWeight:700}}>{user.nombre}</div>
            <div className="user-role" style={{color:C.muted,fontSize:9,marginTop:1}}>{isAdmin?"👑 Administrador":"🧑‍💼 Recepción"}</div>
          </div>
        </div>
        <nav style={{padding:"5px 6px",flex:1,overflowY:"auto"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setVista(n.id)} className="nav-btn" style={{
              width:"100%",padding:"8px 10px",borderRadius:6,border:"none",cursor:"pointer",
              background:vista===n.id?`linear-gradient(135deg,${C.accent}18,${C.accent2}18)`:"transparent",
              color:vista===n.id?C.text:C.muted,borderLeft:`3px solid ${vista===n.id?C.accent:"transparent"}`,
              display:"flex",alignItems:"center",gap:6,marginBottom:1,fontWeight:vista===n.id?700:400,fontSize:11,textAlign:"left",
            }}><span style={{fontSize:12}}>{n.icon}</span><span className="nav-label">{n.label}</span></button>
          ))}
        </nav>
        <div style={{padding:8,borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:5}}>
          <div className="sync-badge"><SyncBadge/></div>
          <div className="quick-btns" style={{display:"flex",flexDirection:"column",gap:5}}>
            <button onClick={()=>{setVista("habitaciones");setModalHab(true);}} style={{width:"100%",padding:"8px",background:`linear-gradient(135deg,${C.green},#059669)`,border:"none",borderRadius:7,color:"white",fontWeight:700,cursor:"pointer",fontSize:11}}>🏠 Check-in</button>
            <button onClick={()=>{setEdit(null);setModal(true);}} style={{width:"100%",padding:"8px",background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:7,color:"white",fontWeight:700,cursor:"pointer",fontSize:11}}>🌊 Reservar Zona</button>
          </div>
          <button onClick={()=>{setUser(null);clearInterval(intervalRef.current);}} style={{width:"100%",padding:"6px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:10,cursor:"pointer"}}>↩ Cerrar sesión</button>
        </div>
      </div>

      {/* BARRA MÓVIL (teléfonos) */}
      <div className="mobile-nav">
        {NAV.slice(0,6).map(n=>(
          <button key={n.id} onClick={()=>setVista(n.id)} style={{flex:1,background:"transparent",border:"none",color:vista===n.id?C.accent:C.muted,cursor:"pointer",padding:"6px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontSize:16}}>
            <span>{n.icon}</span>
            <span style={{fontSize:7,fontWeight:700}}>{n.label.slice(0,5)}</span>
          </button>
        ))}
      </div>

      {/* CONTENIDO */}
      <div className="main-content" style={{flex:1,marginLeft:192,padding:20,minHeight:"100vh",paddingBottom:80}}>
        {loading&&<div style={{position:"fixed",top:0,left:192,right:0,height:3,background:`linear-gradient(90deg,${C.accent},${C.accent2})`,zIndex:50,animation:"pulse 1s infinite"}}/>}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:7}}>
          <div>
            <h1 style={{fontSize:18,fontWeight:800,margin:0}}>{NAV.find(n=>n.id===vista)?.label}</h1>
            <p style={{color:C.muted,fontSize:10,margin:"2px 0 0"}}>{hoyStr()}</p>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {"Notification" in window&&Notification.permission==="default"&&(
              <button onClick={()=>Notification.requestPermission()} style={{background:`${C.yellow}22`,border:`1px solid ${C.yellow}55`,borderRadius:6,padding:"5px 9px",color:C.yellow,fontSize:10,fontWeight:700,cursor:"pointer"}}>
                🔔 Activar alertas
              </button>
            )}
            <button onClick={()=>addNotif("🧪 Prueba · Jacuzzi","Carlos Ruiz · Turno termina en 5 min · Prepara limpieza","warning")} title="Probar notificación" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 9px",color:C.subtle,fontSize:10,cursor:"pointer"}}>🔔 Test</button>
            <button onClick={()=>cargarDatos(false)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 9px",color:C.subtle,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
              {syncStatus==="syncing"?<Spinner size={11} color={C.accent}/>:<span>↻</span>} Actualizar
            </button>
            <button onClick={()=>setVista("reportes")} style={{background:vista==="reportes"?`${C.green}22`:C.card,border:`1px solid ${vista==="reportes"?C.green:C.border}`,borderRadius:6,padding:"5px 9px",color:vista==="reportes"?C.green:C.subtle,fontSize:11,fontWeight:700,cursor:"pointer"}}>
              📊 Reportes
            </button>
          </div>
        </div>

        {/* ══ DASHBOARD ══ */}
        {vista==="dashboard"&&(()=>{
          const hoyK=todayKey;
          // ── Ingresos ─────────────────────────────────────────────
          const startOf=(tipo)=>{
            const d=new Date();
            if(tipo==="dia") return hoyK;
            if(tipo==="semana"){d.setDate(d.getDate()-d.getDay()+1);return d.toISOString().slice(0,10);}
            if(tipo==="mes"){d.setDate(1);return d.toISOString().slice(0,10);}
            return hoyK;
          };
          const ingPeriodo=(inicio)=>{
            const habI=reservasHab.filter(r=>r.checkin>=inicio).reduce((a,r)=>{
              const tp=(parseInt(r.adultos)||1)+(parseInt(r.ninos)||0)+(parseInt(r.mascotas)||0);
              const n=Math.max(1,Math.round((new Date(r.checkout)-new Date(r.checkin))/(864e5)));
              return a+(parseInt(r.precio_noche)||130000)*tp*n;
            },0);
            const zonI=reservas.filter(r=>r.date>=inicio&&r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.total)||0),0);
            return habI+zonI;
          };
          const ingDia=ingPeriodo(startOf("dia"));
          const ingSemana=ingPeriodo(startOf("semana"));
          const ingMes=ingPeriodo(startOf("mes"));

          // ── Checkouts pendientes hoy ──────────────────────────────
          const coHoy=reservasHab.filter(r=>r.checkout===hoyK&&r.estado!=="disponible");
          const coVencidos=reservasHab.filter(r=>r.checkout<hoyK&&r.estado!=="disponible");

          // ── Gráfico línea — ocupación últimos 7 días ──────────────
          const dias7=Array.from({length:7},(_,i)=>{
            const d=new Date(); d.setDate(d.getDate()-6+i);
            const k=d.toISOString().slice(0,10);
            const ocu=reservasHab.filter(r=>r.checkin<=k&&r.checkout>k&&r.estado!=="disponible").length;
            const pct=habitaciones.length>0?Math.round((ocu/habitaciones.length)*100):0;
            const label=d.toLocaleDateString("es-CO",{weekday:"short",day:"numeric"});
            return{k,ocu,pct,label};
          });
          const maxPct=Math.max(...dias7.map(d=>d.pct),10);
          const W=300,H=80,pad=8;
          const pts=dias7.map((d,i)=>{
            const x=pad+(i/(dias7.length-1))*(W-pad*2);
            const y=H-pad-(d.pct/maxPct)*(H-pad*2);
            return{x,y,d};
          });
          const pathD=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(" ");
          const areaD=`${pathD} L${pts[pts.length-1].x},${H-pad} L${pts[0].x},${H-pad} Z`;

          return(
          <div style={{display:"flex",flexDirection:"column",gap:12,animation:"fadeUp .2s ease"}}>

            {/* ── KPIs ingresos ── */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
              {[
                {l:"Ingresos Hoy",v:fmt(ingDia),c:C.green,i:"💵",sub:"día actual"},
                {l:"Ingresos Semana",v:fmt(ingSemana),c:C.teal,i:"📈",sub:"semana en curso"},
                {l:"Ingresos Mes",v:fmt(ingMes),c:C.accent2,i:"🏦",sub:"mes en curso"},
                {l:"Habitaciones Ocupadas",v:`${habsOcupadas}/${habitaciones.length}`,c:C.accent,i:"🏠",sub:`${habitaciones.length>0?Math.round((habsOcupadas/habitaciones.length)*100):0}% ocupación`},
              ].map((k,i)=>(
                <div key={i} style={{background:C.card,borderRadius:11,padding:"13px 14px",border:`1px solid ${k.c}25`,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:10,right:12,fontSize:22,opacity:.15}}>{k.i}</div>
                  <div style={{fontSize:10,color:C.muted,fontWeight:600,marginBottom:3}}>{k.l}</div>
                  <div style={{color:k.c,fontSize:20,fontWeight:800,lineHeight:1.1}}>{k.v}</div>
                  <div style={{fontSize:9,color:C.subtle,marginTop:4}}>{k.sub}</div>
                </div>
              ))}
            </div>

            {/* ── Checkouts pendientes ── */}
            {(coHoy.length>0||coVencidos.length>0)&&(
              <div style={{background:C.card,borderRadius:11,padding:16,border:`2px solid ${coVencidos.length>0?C.red:C.yellow}40`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <h3 style={{margin:0,fontSize:13,fontWeight:700}}>
                    {coVencidos.length>0?"🔴":"🟡"} Checkouts Pendientes
                  </h3>
                  <div style={{display:"flex",gap:6}}>
                    {coVencidos.length>0&&<span style={{background:C.red+"22",color:C.red,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>{coVencidos.length} vencidos</span>}
                    {coHoy.length>0&&<span style={{background:C.yellow+"22",color:C.yellow,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>{coHoy.length} hoy</span>}
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {[...coVencidos.map(r=>({...r,_tipo:"vencido"})),...coHoy.map(r=>({...r,_tipo:"hoy"}))].slice(0,5).map(r=>{
                    const h=huespedes.find(x=>x.id===r.huesped_id);
                    const esVencido=r._tipo==="vencido";
                    return(
                      <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:esVencido?C.red+"12":C.yellow+"10",border:`1px solid ${esVencido?C.red:C.yellow}25`}}>
                        <div style={{fontSize:18}}>{esVencido?"🔴":"🟡"}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:11,fontWeight:700}}>{h?.nombre} {h?.apellidos}</div>
                          <div style={{fontSize:9,color:C.muted}}>Hab. {r.hab} · Checkout: {r.checkout}</div>
                        </div>
                        {parseInt(r.saldo)>0&&<div style={{color:C.red,fontSize:11,fontWeight:800}}>{fmt(parseInt(r.saldo))}<div style={{fontSize:8,color:C.muted,textAlign:"right"}}>saldo</div></div>}
                        <button onClick={()=>{setEditHab(r);setModalHab(true);}} style={{background:C.accent+"22",border:`1px solid ${C.accent}40`,color:C.accent,borderRadius:6,padding:"4px 9px",fontSize:10,fontWeight:700,cursor:"pointer"}}>Ver</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── Gráfico línea ocupación 7 días ── */}
            <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{margin:0,fontSize:13,fontWeight:700}}>📊 Ocupación — Últimos 7 días</h3>
                <span style={{fontSize:10,color:C.muted}}>% habitaciones ocupadas</span>
              </div>
              <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:90,overflow:"visible"}}>
                <defs>
                  <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.accent} stopOpacity="0.3"/>
                    <stop offset="100%" stopColor={C.accent} stopOpacity="0.02"/>
                  </linearGradient>
                </defs>
                {/* Grid lines */}
                {[0,25,50,75,100].map(pct=>{
                  const y=H-pad-(pct/maxPct)*(H-pad*2);
                  if(y<pad||y>H-pad)return null;
                  return<line key={pct} x1={pad} y1={y} x2={W-pad} y2={y} stroke={C.border} strokeWidth="0.5" strokeDasharray="3,3"/>;
                })}
                {/* Area */}
                <path d={areaD} fill="url(#lineGrad)"/>
                {/* Line */}
                <path d={pathD} fill="none" stroke={C.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                {/* Points + labels */}
                {pts.map((p,i)=>(
                  <g key={i}>
                    <circle cx={p.x} cy={p.y} r="3.5" fill={C.accent} stroke={C.card} strokeWidth="1.5"/>
                    <text x={p.x} y={p.y-8} textAnchor="middle" fontSize="7" fill={C.accent} fontWeight="700">{p.d.pct}%</text>
                    <text x={p.x} y={H+2} textAnchor="middle" fontSize="7" fill={C.muted}>{p.d.label}</text>
                  </g>
                ))}
              </svg>
            </div>

            {/* ── Check-ins / Checkouts hoy ── */}
            <div style={{background:C.card,borderRadius:11,padding:16,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
                <h3 style={{margin:0,fontSize:13,fontWeight:700}}>🏠 Movimientos de Hoy</h3>
                <button onClick={()=>setVista("habitaciones")} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px",color:C.muted,fontSize:10,cursor:"pointer"}}>Ver todas →</button>
              </div>
              {(()=>{
                const checkins=reservasHab.filter(r=>r.checkin===hoyK);
                const checkouts=reservasHab.filter(r=>r.checkout===hoyK);
                if(!checkins.length&&!checkouts.length)return<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:"14px 0"}}>Sin movimientos hoy</div>;
                return[...checkins.map(r=>({...r,tipo_mov:"checkin"})),...checkouts.map(r=>({...r,tipo_mov:"checkout"}))].map(r=>{
                  const h=huespedes.find(x=>x.id===r.huesped_id);

                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}>

                          </td>
                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}>
                            <div style={{display:"flex",gap:3}}>
                              <button onClick={()=>{setEditHuesped(h);setModalHuesped(true);}} style={{background:C.accent+"22",border:"none",color:C.accent,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}}>✏️</button>
                              {isAdmin&&<button onClick={()=>setDelHuesped(h)} style={{background:C.red+"22",border:"none",color:C.red,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10}}>🗑️</button>}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {filteredH.length===0&&<div style={{textAlign:"center",padding:28,color:C.muted,fontSize:12}}>{busqH?`Sin resultados para "${busqH}"`:"Sin huéspedes registrados"}</div>}
              {totalPagesH>1&&(
                <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:6,padding:"10px 14px",borderTop:`1px solid ${C.border}`,background:C.surface}}>
                  <button onClick={()=>setPageH(p=>Math.max(0,p-1))} disabled={pageH===0}
                    style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",color:pageH===0?C.dim:C.text,cursor:pageH===0?"not-allowed":"pointer",fontSize:11}}>‹ Anterior</button>
                  {Array.from({length:totalPagesH},(_,i)=>(
                    <button key={i} onClick={()=>setPageH(i)}
                      style={{background:pageH===i?C.accent:"transparent",border:`1px solid ${pageH===i?C.accent:C.border}`,borderRadius:5,padding:"3px 8px",color:pageH===i?"white":C.muted,cursor:"pointer",fontSize:10,fontWeight:pageH===i?700:400,minWidth:28}}>
                      {i+1}
                    </button>
                  ))}
                  <button onClick={()=>setPageH(p=>Math.min(totalPagesH-1,p+1))} disabled={pageH===totalPagesH-1}
                    style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",color:pageH===totalPagesH-1?C.dim:C.text,cursor:pageH===totalPagesH-1?"not-allowed":"pointer",fontSize:11}}>Siguiente ›</button>
                  <span style={{color:C.muted,fontSize:9}}>Página {pageH+1} de {totalPagesH}</span>
                </div>
              )}
            </div>
          </div>
          );
        })()}

        {/* ══ ZONAS HÚMEDAS ══ */}
        {vista==="zonas"&&(
          <div style={{animation:"fadeUp .2s ease"}}>
            {/* Filtros fecha + tipo */}
            <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
              {[{v:"hoy",l:"📅 Hoy"},{v:"semana",l:"📆 7 días"},{v:"mes",l:"🗓 30 días"},{v:"todos",l:"🔍 Todos"}].map(x=>(
                <button key={x.v} onClick={()=>setFiltroFecha(x.v)}
                  style={{padding:"5px 11px",borderRadius:5,border:"1px solid",cursor:"pointer",fontSize:10,fontWeight:700,
                    borderColor:filtroFecha===x.v?C.teal:C.border,
                    background:filtroFecha===x.v?C.teal+"18":C.card,
                    color:filtroFecha===x.v?C.teal:C.muted}}>
                  {x.l}
                </button>
              ))}
              <div style={{flex:1}}/>
              <span style={{fontSize:9,color:C.dim}}>{filtered.length} registro{filtered.length!==1?"s":""}</span>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:11,flexWrap:"wrap",alignItems:"center"}}>
              <input placeholder="🔍 Nombre, habitación o fecha..." value={busq} onChange={e=>setBusq(e.target.value)}
                style={{flex:1,minWidth:150,background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px",color:C.text,fontSize:11,outline:"none"}}/>
              {["todos","huesped","externo","activo","confirmado","pendiente","completado"].map(f=>(
                <button key={f} onClick={()=>setFiltro(f)} style={{padding:"5px 9px",borderRadius:5,border:"1px solid",cursor:"pointer",fontSize:9,fontWeight:700,
                  borderColor:filtro===f?C.accent:C.border,background:filtro===f?"#0EA5E915":C.card,color:filtro===f?C.accent:C.muted,textTransform:"capitalize"}}>
                  {f}
                </button>
              ))}
              <button onClick={()=>{setEdit(null);setModal(true);}} style={{background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:6,padding:"6px 12px",color:"white",fontWeight:700,cursor:"pointer",fontSize:11}}>+ Nueva</button>
            </div>
            {/* Resumen ingresos zonas */}
            {(()=>{
              const extR=reservas.filter(r=>r.tipo!=="huesped");
              const cobradoZ=extR.filter(r=>r.pago!=="pendiente"&&r.pago!=="cortesia").reduce((a,r)=>a+(parseInt(r.total)||0),0);
              const pendienteZ=extR.filter(r=>r.pago==="pendiente").reduce((a,r)=>a+(parseInt(r.total)||0),0);
              const PAGO_ZONA=[
                {pm:"efectivo",lbl:"💵 Efectivo",col:C.green},
                {pm:"tarjeta",lbl:"💳 Tarjeta",col:C.accent2},
                {pm:"transferencia",lbl:"🏦 Transferencia",col:C.accent},
                {pm:"cortesia",lbl:"🎁 Cortesía",col:C.teal},
              ].map(x=>({...x,tot:extR.filter(r=>r.pago===x.pm).reduce((a,r)=>a+(parseInt(r.total)||0),0),num:extR.filter(r=>r.pago===x.pm).length})).filter(x=>x.num>0);
              return(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginBottom:11}}>
                  <div style={{background:C.card,borderRadius:9,padding:"10px 13px",border:`1px solid ${C.green}25`}}>
                    <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:3}}>💰 TOTAL COBRADO</div>
                    <div style={{color:C.green,fontWeight:800,fontSize:16}}>{fmt(cobradoZ)}</div>
                  </div>
                  <div style={{background:C.card,borderRadius:9,padding:"10px 13px",border:`1px solid ${C.red}25`}}>
                    <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:3}}>⏳ PENDIENTE</div>
                    <div style={{color:pendienteZ>0?C.red:C.muted,fontWeight:800,fontSize:16}}>{fmt(pendienteZ)}</div>
                  </div>
                  {PAGO_ZONA.map(x=>(
                    <div key={x.pm} style={{background:C.card,borderRadius:9,padding:"10px 13px",border:`1px solid ${x.col}25`}}>
                      <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:3}}>{x.lbl}</div>
                      <div style={{color:x.col,fontWeight:800,fontSize:15}}>{fmt(x.tot)}</div>
                      <div style={{color:C.dim,fontSize:9,marginTop:2}}>{x.num} reserva{x.num!==1?"s":""}</div>
                    </div>
                  ))}
                </div>
              );
            })()}

            <div style={{background:C.card,borderRadius:11,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
                  <thead>
                    <tr style={{background:C.surface}}>
                      {["#","Fecha","Cliente","Cédula","Tipo","Servicio","Hora","A/N","Pago","Estado","Total",""].map(h=>(
                        <th key={h} style={{padding:"8px 10px",color:C.muted,fontSize:9,fontWeight:700,textAlign:"left",borderBottom:`1px solid ${C.border}`,letterSpacing:.3,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:hMin(a.hora||"0:0")-hMin(b.hora||"0:0")).map((r,idx)=>{
                      const sv=svc[r.servicio];
                      return(
                        <tr key={r.id} style={{background:idx%2===0?"transparent":C.card2}}
                          onMouseEnter={e=>e.currentTarget.style.background=C.border+"22"}
                          onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"transparent":C.card2}>
                          <td style={{padding:"7px 10px",color:C.muted,fontSize:9,borderBottom:`1px solid ${C.border}10`}}>{String(r.id).slice(-5)}</td>
                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}>
                            <div style={{fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{fmtFecha(r.date)}</div>
                            {r.date===todayKey&&<Tag text="HOY" color={C.teal} size={8}/>}
                          </td>
                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}>
                            <div style={{fontSize:11,fontWeight:600}}>{r.nombre}</div>
                            {r.hab&&<div style={{color:C.muted,fontSize:9}}>🏨 {r.hab}</div>}
                          </td>
                          <td style={{padding:"7px 10px",fontSize:9,color:C.muted,fontFamily:"monospace",borderBottom:`1px solid ${C.border}10`}}>{r.cedula||"—"}</td>
                          <td style={{padding:"7px 10px",borderBottom:`1px solid ${C.border}10`}}><Tag text={r.tipo==="huesped"?"HUÉSPED":"EXTERNO"} color={r.tipo==="huesped"?C.accent:C.pink}/></td>
